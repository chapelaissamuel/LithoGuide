<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#3B1F6B">
<title>💎 Cristaux de Lorient</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💎</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0F0A1A;--bg2:#1A1228;--card:#201830;--tx:#F0EAF8;--tl:#9B8AB0;--ac:#C084FC;--ac2:#A855F7;--gold:#F0C060;--teal:#34D399;--rose:#F472B6;--sh:0 4px 24px rgba(168,85,247,.12);--sh2:0 8px 32px rgba(168,85,247,.2)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth;-webkit-overflow-scrolling:touch}
body{font-family:'Quicksand',sans-serif;background:var(--bg);color:var(--tx);max-width:540px;margin:0 auto;min-height:100vh;overflow-x:hidden;transition:background .2s,color .2s}
button{font-family:inherit;cursor:pointer;border:none}h1,h2,h3{font-family:'Cormorant Garamond',serif}a{color:inherit;text-decoration:none}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(168,85,247,.07) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(52,211,153,.05) 0%,transparent 50%);pointer-events:none;z-index:0}
#app{position:relative;z-index:1}
/* Light mode */
body.lm{--bg:#F5F0FF;--bg2:#EDE5FF;--card:#fff;--tx:#1A0F2E;--tl:#7B6A9A;--sh:0 4px 24px rgba(107,47,160,.07);--sh2:0 8px 32px rgba(107,47,160,.14)}
body.lm::before{background:radial-gradient(ellipse at 20% 20%,rgba(168,85,247,.04) 0%,transparent 50%)}
/* Header */
.hdr{background:linear-gradient(135deg,#3B1F6B,#6B2FA0,#3B1F6B);padding:16px 18px 12px;color:#fff;position:sticky;top:0;z-index:100;box-shadow:0 4px 24px rgba(107,47,160,.4);border-bottom:1px solid rgba(192,132,252,.2)}
.hdr-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.hdr h1{font-size:1.3rem;font-weight:700;font-style:italic;text-shadow:0 0 20px rgba(192,132,252,.4)}
.hdr p{font-size:.78rem;opacity:.8;font-weight:600;margin-top:2px}
.hdr-acts{display:flex;gap:6px;flex-shrink:0;padding-top:2px}
.ico-btn{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:10px;width:34px;height:34px;font-size:1rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s}.ico-btn:active{background:rgba(255,255,255,.3)}
.bk{background:rgba(255,255,255,.15);color:#fff;border-radius:10px;padding:7px 14px;font-size:.82rem;font-weight:700;margin-bottom:6px;display:inline-flex;align-items:center;gap:5px;cursor:pointer;border:none}
/* Tabs */
.tabs{display:flex;position:sticky;top:62px;z-index:99;background:var(--bg2);box-shadow:0 2px 12px rgba(0,0,0,.3);border-bottom:1px solid rgba(192,132,252,.1);transition:background .2s}
.tab{flex:1;padding:10px 0;text-align:center;font-size:.68rem;font-weight:700;border-bottom:3px solid transparent;color:var(--tl);transition:all .15s;cursor:pointer}
.tab.on{color:var(--ac);border-bottom-color:var(--ac)}
/* Search */
.search-wrap{padding:10px 14px 4px;position:relative}
.search-ico{position:absolute;left:26px;top:50%;transform:translateY(-50%);opacity:.4;pointer-events:none}
.si{width:100%;padding:11px 14px 11px 40px;border-radius:14px;border:1.5px solid rgba(192,132,252,.15);background:var(--card);color:var(--tx);font-size:.88rem;font-weight:600;outline:none;font-family:'Quicksand',sans-serif;transition:border-color .2s}
.si:focus{border-color:var(--ac)}.si::placeholder{color:var(--tl)}
/* Chips */
.chs{display:flex;gap:7px;padding:7px 14px;overflow-x:auto;scrollbar-width:none}.chs::-webkit-scrollbar{display:none}
.ch{flex-shrink:0;padding:6px 13px;border-radius:18px;font-size:.74rem;font-weight:700;white-space:nowrap;transition:all .15s;cursor:pointer;border:1.5px solid rgba(192,132,252,.12);background:var(--card);color:var(--tx)}
.ch.on{color:#fff;box-shadow:0 2px 12px rgba(168,85,247,.35);border-color:transparent}
/* Grid */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px;padding:8px 14px 40px}
/* Stone card */
.sc{background:var(--card);border-radius:18px;padding:15px 10px 13px;text-align:center;box-shadow:var(--sh);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:transform .12s,box-shadow .12s;position:relative;border:1px solid rgba(192,132,252,.08)}
.sc:active{transform:scale(.97)}.sc:hover{box-shadow:var(--sh2);border-color:rgba(192,132,252,.2)}
.sc .gem{font-size:2.6rem;filter:drop-shadow(0 0 6px rgba(192,132,252,.35))}
.sc h3{font-size:.9rem;font-weight:700;line-height:1.2;font-family:'Cormorant Garamond',serif}
.sc .tg{font-size:.62rem;color:var(--tl);font-weight:600;line-height:1.3;font-style:italic}
.sc .cat-bd{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:.58rem;font-weight:700;margin-top:2px}
.sc .fav-btn{position:absolute;top:7px;right:7px;font-size:.88rem;background:none;border:none;opacity:.28;transition:opacity .15s,transform .15s;cursor:pointer;padding:2px}.sc .fav-btn.on{opacity:1}.sc .fav-btn:active{transform:scale(1.3)}
.sc .cdot{position:absolute;top:8px;left:8px;width:8px;height:8px;border-radius:50%;box-shadow:0 0 5px currentColor}
.sc .warn{position:absolute;bottom:8px;right:8px;font-size:.65rem;opacity:.6}
/* Section label */
.ct{font-size:.66rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--tl);padding:14px 14px 5px;display:flex;align-items:center;gap:8px}
.ct::after{content:'';flex:1;height:1px;background:rgba(192,132,252,.1)}
/* Detail */
.hr{text-align:center;padding:22px 18px 10px}
.hr .gem-big{font-size:4.5rem;display:block;filter:drop-shadow(0 0 16px rgba(192,132,252,.5));animation:pulse 3s ease-in-out infinite}
@keyframes pulse{0%,100%{filter:drop-shadow(0 0 14px rgba(192,132,252,.4))}50%{filter:drop-shadow(0 0 26px rgba(192,132,252,.7))}}
.hr h2{font-size:1.4rem;font-weight:700;font-style:italic;margin-top:8px}
.hr .tg-big{font-size:.8rem;color:var(--tl);font-weight:600;font-style:italic;margin-top:3px}
.hr .badges-row{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-top:10px}
/* Info blocks */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 14px 10px}
.ic{background:var(--card);border-radius:14px;padding:14px;border:1px solid rgba(192,132,252,.1)}
.ic .lbl{font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--tl);margin-bottom:5px}
.ic .val{font-size:.8rem;font-weight:600;line-height:1.5}
.icf{background:var(--card);border-radius:14px;padding:15px;margin:0 14px 10px;border:1px solid rgba(192,132,252,.1)}
.icf .lbl{font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--tl);margin-bottom:7px}
.icf .val{font-size:.82rem;font-weight:600;line-height:1.65}
/* Maux pills */
.maux-wrap{display:flex;flex-wrap:wrap;gap:6px}
.mp{padding:5px 12px;border-radius:20px;font-size:.72rem;font-weight:700;background:rgba(192,132,252,.1);color:var(--ac);border:1px solid rgba(192,132,252,.2)}
/* Chakra bar */
.cha-bar{display:flex;gap:6px;padding:0 14px 10px;flex-wrap:wrap}
.cha-tag{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;font-size:.7rem;font-weight:700;background:var(--card);border:1px solid rgba(255,255,255,.07)}
.cha-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;box-shadow:0 0 6px currentColor}
/* Conseil */
.conseil-card{background:linear-gradient(135deg,rgba(192,132,252,.08),rgba(52,211,153,.05));border:1px solid rgba(192,132,252,.2);border-radius:14px;padding:15px;margin:0 14px 10px;display:flex;flex-direction:column;gap:10px}
.conseil-txt{font-size:.84rem;font-weight:600;line-height:1.65;font-style:italic}
.conseil-copy{align-self:flex-start;padding:8px 16px;background:rgba(192,132,252,.14);color:var(--ac);border:1px solid rgba(192,132,252,.28);border-radius:10px;font-size:.76rem;font-weight:700;cursor:pointer;transition:all .15s;font-family:inherit}.conseil-copy:active{background:rgba(192,132,252,.28)}
/* Warning box */
.warn-box{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:12px;padding:12px 14px;margin:0 14px 10px;font-size:.76rem;font-weight:600;color:#FCA5A5;line-height:1.5}
/* Links */
.lnk{display:flex;align-items:center;gap:10px;margin:5px 14px;padding:13px;background:var(--card);border-radius:14px;box-shadow:var(--sh);border:1px solid rgba(192,132,252,.1);transition:border-color .15s}
.lnk:active{transform:scale(.98)}.lnk:hover{border-color:rgba(192,132,252,.3)}
.lnk-ico{font-size:1.2rem;flex-shrink:0}.lnk-text{flex:1}
.lnk-title{font-size:.81rem;font-weight:700}.lnk-sub{font-size:.64rem;color:var(--tl);margin-top:1px}
.lnk .arr{color:var(--ac);font-weight:800;font-size:.9rem}
/* Star rating */
.stars-row{display:flex;gap:5px;justify-content:center;margin-top:10px}
.star-btn{font-size:1.2rem;background:rgba(240,192,96,.1);border:none;border-radius:8px;width:38px;height:38px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}.star-btn:active{transform:scale(1.2)}.star-btn.lit{background:rgba(240,192,96,.25)}
/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.modal{background:var(--bg2);border-radius:20px 20px 0 0;padding:22px 20px 44px;width:100%;max-width:540px;max-height:85vh;overflow-y:auto;border-top:1px solid rgba(192,132,252,.2)}
.modal h2{font-size:1.1rem;font-weight:700;font-style:italic;margin-bottom:14px}
.mrow{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid rgba(192,132,252,.07);gap:12px}
.mlabel{font-size:.86rem;font-weight:700}.msub{font-size:.7rem;color:var(--tl);margin-top:2px}
.toggle{width:46px;height:26px;border-radius:13px;background:#444;position:relative;cursor:pointer;flex-shrink:0;transition:background .2s}
.toggle.on{background:var(--ac2)}.toggle::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.3)}.toggle.on::after{transform:translateX(19px)}
/* Empty */
.empty{padding:60px 20px;text-align:center}.empty .big{font-size:3rem;opacity:.3}
.empty p{font-size:.86rem;color:var(--tl);font-weight:600;margin-top:12px;line-height:1.65}
/* Count badge */
.cnt{font-size:.55rem;background:rgba(192,132,252,.25);color:var(--ac);padding:1px 5px;border-radius:8px;font-weight:800;vertical-align:middle;margin-left:2px}
</style>
</head>
<body>
<div id="app"></div>
<script>
const STONES = [
{id:1,gem:"💜",name:"Améthyste",tagline:"Sérénité, protection & intuition",category:"Spirituel",maux:["Stress","Anxiété","Insomnie","Méditation","Addiction","Intuition","Cauchemars"],chakras:["Couronne","Troisième œil"],composition:"Quartz violet coloré par des traces de fer (Fe³⁺), système trigonal",vertus:"Apaise le mental agité, favorise la méditation profonde et le sommeil réparateur. Protège des énergies négatives et aide au sevrage des addictions. Stimule l'intuition et la clairvoyance. Excellent bouclier énergétique pour les personnes sensibles.",purification:"Eau courante, lumière de lune, encens de sauge blanche. Éviter le soleil direct (décoloration).",port:"Bracelet, pendentif, pierre de poche. Poser sous l'oreiller pour le sommeil.",mindat:"https://www.mindat.org/min-198.html",wiki:"https://fr.wikipedia.org/wiki/Am%C3%A9thyste",color:"#9B59B6"},
{id:2,gem:"🩷",name:"Quartz Rose",tagline:"Amour universel & guérison du cœur",category:"Émotionnel",maux:["Amour","Confiance","Deuil","Chagrin","Relations","Estime de soi","Solitude"],chakras:["Cœur"],composition:"Quartz rose, coloré par des inclusions de dumortierite ou fibres de rutile",vertus:"Ouvre le chakra du cœur à l'amour sous toutes ses formes. Apaise les peines de cœur et les deuils. Développe l'empathie, la douceur et la bienveillance envers soi-même. Attire les relations harmonieuses et renforce les liens existants.",purification:"Eau courante, lumière de lune, géode de quartz. À l'abri du soleil.",port:"Pendentif sur le cœur, bracelet, pierre en poche. Poser sur la table de nuit.",mindat:"https://www.mindat.org/min-3337.html",wiki:"https://fr.wikipedia.org/wiki/Quartz_rose",color:"#F472B6"},
{id:3,gem:"🌑",name:"Tourmaline Noire",tagline:"Bouclier absolu contre la négativité",category:"Spirituel",maux:["Protection","Ondes électromagnétiques","Peur","Anxiété","Énergie négative","Vampirisme énergétique"],chakras:["Racine"],composition:"Silicate complexe de bore, aluminium et fer. Groupe des cyclosilicates.",vertus:"Protection absolue contre les énergies négatives et les ondes électromagnétiques (WiFi, 4G). Ancrage puissant dans le présent. Éloigne la peur, le pessimisme et les pensées intrusives. Crée un bouclier énergétique autour de l'aura. Indispensable aux personnes hypersensibles.",purification:"Eau courante, encens, enfouissement en terre. Purifier très souvent car elle absorbe énormément.",port:"Poche gauche, bracelet poignet gauche, poser près des box WiFi et télévisions.",mindat:"https://www.mindat.org/min-4003.html",wiki:"https://fr.wikipedia.org/wiki/Tourmaline",color:"#1C1917"},
{id:4,gem:"✨",name:"Labradorite",tagline:"Transformation, magie & protection de l'aura",category:"Spirituel",maux:["Protection","Intuition","Transformation","Clairvoyance","Confiance","Burn-out"],chakras:["Troisième œil","Gorge","Couronne"],composition:"Feldspath plagioclase avec labradorescence (interférences lumineuses sur les clivages)",vertus:"Pierre de protection majeure des thérapeutes et personnes exposées aux énergies d'autrui. Amplifie l'intuition et révèle la vérité cachée. Favorise les transformations profondes et les prises de conscience. Protège l'aura contre les intrusions extérieures.",purification:"Lumière de lune, encens, géode d'améthyste. Éviter l'eau prolongée.",port:"Pendentif, bracelet. Idéale pour les thérapeutes et soignants.",mindat:"https://www.mindat.org/min-2362.html",wiki:"https://fr.wikipedia.org/wiki/Labradorite",color:"#3B82F6"},
{id:5,gem:"💛",name:"Citrine",tagline:"Soleil, abondance & confiance en soi",category:"Émotionnel",maux:["Confiance","Dépression","Abondance","Motivation","Joie","Digestion","Peur d'échouer"],chakras:["Plexus solaire","Sacré"],composition:"Quartz jaune coloré par des traces de fer (Fe³⁺), souvent traité thermiquement",vertus:"Apporte joie, optimisme et positivité durable. Stimule la confiance en soi et la créativité. Attire l'abondance et la prospérité matérielle. Combat la dépression saisonnière. Stimule la digestion et le système nerveux. Pierre dite autonettoyante.",purification:"Eau courante, lumière du soleil (autonettoyante). Ne se charge pas négativement.",port:"Poche droite ou porte-monnaie pour attirer l'abondance. Bracelet, bague.",mindat:"https://www.mindat.org/min-1071.html",wiki:"https://fr.wikipedia.org/wiki/Citrine_(min%C3%A9ral)",color:"#F59E0B"},
{id:6,gem:"🟡",name:"Œil de Tigre",tagline:"Volonté, courage & ancrage terrestre",category:"Émotionnel",maux:["Confiance","Courage","Fatigue","Motivation","Décision","Peur","Procrastination"],chakras:["Plexus solaire","Sacré","Racine"],composition:"Quartz fibreux pseudomorphe d'amphibole (crocidolite), effet chatoyant",vertus:"Renforce la volonté et la détermination face aux obstacles. Aide à prendre des décisions claires. Combat la procrastination et la peur de l'échec. Donne courage et confiance dans les situations difficiles. Ancre dans la réalité et protège lors des voyages.",purification:"Eau courante, lumière du soleil, fumigation à la sauge.",port:"Bracelet poignet dominant, bague, pierre en poche lors des entretiens ou défis.",mindat:"https://www.mindat.org/min-3337.html",wiki:"https://fr.wikipedia.org/wiki/%C5%92il-de-tigre",color:"#B45309"},
{id:7,gem:"💙",name:"Lapis Lazuli",tagline:"Sagesse royale, vérité & communication",category:"Spirituel",maux:["Communication","Expression","Sagesse","Stress","Migraine","Confiance","Timidité"],chakras:["Troisième œil","Gorge"],composition:"Roche métamorphique : lazurite, calcite et pyrite dorée",vertus:"Stimule l'intellect, la sagesse et la mémoire. Favorise la communication authentique et l'expression de la vérité. Développe la clairvoyance et les capacités psychiques. Soulage les migraines et les tensions de la nuque. Pierre des dirigeants et des personnes en autorité.",purification:"Eau courante brève uniquement. Lumière de lune, encens. Ne pas laisser tremper.",port:"Pendentif gorge ou troisième œil, boucles d'oreilles, bracelet.",mindat:"https://www.mindat.org/min-2367.html",wiki:"https://fr.wikipedia.org/wiki/Lapis-lazuli",color:"#1D4ED8"},
{id:8,gem:"🟢",name:"Malachite",tagline:"Transformation émotionnelle & libération",category:"Émotionnel",maux:["Douleurs","Transformation","Relations toxiques","Peur","Arthrose","Règles douloureuses"],chakras:["Cœur","Plexus solaire"],composition:"Carbonate de cuivre hydraté Cu₂(CO₃)(OH)₂, structure monoclinique, stries vertes",vertus:"Absorbe et dissout les émotions négatives et les traumatismes profonds. Libère les blocages émotionnels ancrés depuis l'enfance. Soulage les douleurs physiques et les inflammations. Aide les grandes transformations de vie. Protège les voyageurs. À utiliser avec précaution (puissante).",purification:"JAMAIS dans l'eau (toxique sous forme de poudre). Lumière de lune et encens uniquement.",port:"Pendentif, bracelet. Ne pas avaler. Laver les mains après manipulation en poudre.",mindat:"https://www.mindat.org/min-2550.html",wiki:"https://fr.wikipedia.org/wiki/Malachite",color:"#059669"},
{id:9,gem:"🔵",name:"Sodalite",tagline:"Calme, logique & clarté mentale",category:"Émotionnel",maux:["Stress","Communication","Panique","Clarté mentale","Tension artérielle","Surmenage"],chakras:["Gorge","Troisième œil"],composition:"Silicate d'aluminium et de sodium avec chlore, groupe des feldspathoïdes",vertus:"Apporte calme et rationalité dans les situations d'urgence. Réduit les crises de panique et l'anxiété généralisée. Favorise la communication sincère et directe. Développe la confiance en soi. Soulage les tensions et régule la pression artérielle.",purification:"Eau courante, lumière de lune, encens de lavande.",port:"Bracelet, pendentif, pierre sur le bureau ou lieu de travail.",mindat:"https://www.mindat.org/min-3701.html",wiki:"https://fr.wikipedia.org/wiki/Sodalite",color:"#2563EB"},
{id:10,gem:"🌙",name:"Pierre de Lune",tagline:"Féminité, cycles & intuition lunaire",category:"Spirituel",maux:["Cycles féminins","Intuition","Émotions","Fertilité","Insomnie","Transitions"],chakras:["Couronne","Sacré"],composition:"Feldspath orthose à structure lamellaire produisant l'adularescence (reflets bleutés)",vertus:"Régule et apaise les cycles féminins (règles, ménopause). Amplifie l'intuition et les perceptions subtiles. Apaise les émotions intenses. Favorise la fertilité et accompagne la grossesse. Aide lors des changements et nouveaux départs. Pierre des voyageurs nocturnes.",purification:"Lumière de pleine lune (idéalement). Encens doux. Éviter l'eau et le soleil direct.",port:"Pendentif, bracelet. Poser sur le ventre lors des douleurs de règles.",mindat:"https://www.mindat.org/min-3.html",wiki:"https://fr.wikipedia.org/wiki/Pierre_de_lune",color:"#BFDBFE"},
{id:11,gem:"⚡",name:"Obsidienne Noire",tagline:"Vérité absolue & ancrage profond",category:"Spirituel",maux:["Protection","Vérité","Traumatisme","Ancrage","Blocages profonds","Chagrin"],chakras:["Racine"],composition:"Verre volcanique naturel riche en silice (SiO₂), refroidissement rapide du magma",vertus:"Pierre de vérité puissante qui révèle ce qui est caché en soi. Dissout les blocages émotionnels les plus profonds. Protège contre la négativité ambiante. Ancre très fortement dans le présent. À utiliser avec accompagnement si fragilité psychologique.",purification:"Eau courante, terre, encens de sauge. Purifier très fréquemment.",port:"Pierre de poche, bracelet. Déconseillée aux personnes très fragiles sans accompagnement.",mindat:"https://www.mindat.org/min-2950.html",wiki:"https://fr.wikipedia.org/wiki/Obsidienne",color:"#0C0A09"},
{id:12,gem:"💚",name:"Aventurine Verte",tagline:"Chance, opportunités & cœur ouvert",category:"Émotionnel",maux:["Chance","Anxiété","Prise de décision","Stress","Peau","Allergie"],chakras:["Cœur"],composition:"Quartz aventuriné avec inclusions de fuchsite (mica vert), effet aventurescence",vertus:"Pierre de chance et d'opportunités par excellence. Ouvre le cœur aux nouvelles expériences. Réduit l'anxiété de décision et apporte la sérénité. Excellente pour la peau et les allergies cutanées. Favorise la croissance personnelle et professionnelle.",purification:"Eau courante, lumière du soleil modérée, géode de quartz.",port:"Poche gauche, pendentif cœur, bracelet. Utile lors de jeux de hasard (tradition).",mindat:"https://www.mindat.org/min-3337.html",wiki:"https://fr.wikipedia.org/wiki/Aventurine",color:"#34D399"},
{id:13,gem:"🔴",name:"Jaspe Rouge",tagline:"Vitalité, ancrage & endurance physique",category:"Physique",maux:["Fatigue","Vitalité","Ancrage","Libido","Endurance","Circulation","Anémie"],chakras:["Racine","Sacré"],composition:"Quartz microcristallin rouge avec oxydes de fer (hématite), opaque",vertus:"Redonne énergie et vitalité aux personnes épuisées. Ancrage puissant dans le présent. Stimule la libido et l'énergie sexuelle. Améliore l'endurance physique et le système circulatoire. Soutient le foie et la détoxification. Pierre des athlètes et des convalescents.",purification:"Eau courante, lumière du soleil, enfouissement en terre.",port:"Bracelet, poche, pierre dans la chaussure gauche pour l'ancrage.",mindat:"https://www.mindat.org/min-2087.html",wiki:"https://fr.wikipedia.org/wiki/Jaspe",color:"#DC2626"},
{id:14,gem:"🌿",name:"Chrysoprase",tagline:"Espoir, joie & équilibre émotionnel",category:"Émotionnel",maux:["Dépression","Espoir","Jalousie","Cœur","Peau","Solitude"],chakras:["Cœur"],composition:"Calcédoine verte colorée par des traces de nickel, structure cryptocristalline",vertus:"Apporte espoir et optimisme durable. Combat la dépression et la jalousie. Favorise les nouvelles relations et l'ouverture aux autres. Équilibre les émotions instables. Bénéfique pour les problèmes de peau (eczéma, psoriasis). Pierre du renouveau printanier.",purification:"Eau courante, lumière de lune. Éviter le soleil direct (décoloration possible).",port:"Pendentif, bracelet. Particulièrement utile au printemps et lors des nouvelles phases de vie.",mindat:"https://www.mindat.org/min-1039.html",wiki:"https://fr.wikipedia.org/wiki/Chrysoprase",color:"#4ADE80"},
{id:15,gem:"🌸",name:"Kunzite",tagline:"Amour inconditionnel & guérison du cœur",category:"Émotionnel",maux:["Amour","Anxiété profonde","Dépression","Traumatisme affectif","Bouclier émotionnel"],chakras:["Cœur","Couronne"],composition:"Spodumène rose-violet, silicate de lithium et aluminium, pléochroïsme prononcé",vertus:"Ouvre le cœur à l'amour inconditionnel de manière progressive et douce. Dissout les boucliers émotionnels construits après les traumatismes. Apaise l'anxiété chronique profonde. Aide à surmonter les traumatismes affectifs anciens. Pierre idéale pour les personnes ayant du mal à s'ouvrir.",purification:"Lumière de lune uniquement. Très fragile mécaniquement, éviter l'eau et les chocs.",port:"Pendentif sur le cœur, pierre sous l'oreiller. Manipulation douce requise.",mindat:"https://www.mindat.org/min-2345.html",wiki:"https://fr.wikipedia.org/wiki/Kunzite",color:"#F9A8D4"},
{id:16,gem:"🟠",name:"Cornaline",tagline:"Créativité, passion & vitalité du feu",category:"Physique",maux:["Créativité","Vitalité","Sexualité","Confiance","Fertilité","Motivation","Blocage créatif"],chakras:["Sacré","Racine"],composition:"Calcédoine orange-rouge colorée par des oxydes de fer, structure cryptocristalline",vertus:"Stimule la créativité, la passion et l'énergie vitale. Redonne l'élan et la motivation. Développe la confiance en ses capacités. Favorise la fertilité et soutient les organes reproducteurs. Combat la timidité et les inhibitions. Pierre des artistes et créateurs.",purification:"Eau courante, lumière du soleil, encens de cannelle.",port:"Bracelet poignet créateur, bague, pierre sur le bureau ou atelier.",mindat:"https://www.mindat.org/min-897.html",wiki:"https://fr.wikipedia.org/wiki/Cornaline",color:"#EA580C"},
{id:17,gem:"❄️",name:"Quartz Cristal",tagline:"Amplificateur universel & clarté pure",category:"Spirituel",maux:["Clarté","Énergie","Méditation","Concentration","Immunité","Amplification"],chakras:["Tous les chakras","Couronne"],composition:"Dioxyde de silicium (SiO₂) pur, système trigonal. Le plus pur des quartz.",vertus:"Amplifie l'énergie de toutes les autres pierres (multiplier son effet en l'associant). Clarifie la pensée et la conscience. Renforce le système immunitaire. Excellent pour la méditation et la programmation d'intentions. Se programme facilement avec une intention précise.",purification:"Toutes méthodes : eau, soleil, lune, terre, encens. Pierre autonettoyante.",port:"En combinaison avec toute autre pierre pour amplifier ses effets. Pendentif, bracelet.",mindat:"https://www.mindat.org/min-3337.html",wiki:"https://fr.wikipedia.org/wiki/Quartz",color:"#E0E7FF"},
{id:18,gem:"🦋",name:"Lépidolite",tagline:"Anti-stress naturel au lithium",category:"Émotionnel",maux:["Stress","Anxiété","Insomnie","Dépression","Transitions difficiles","Troubles bipolaires"],chakras:["Troisième œil","Couronne","Cœur"],composition:"Mica lithifère rose-violet, riche en lithium naturel. Phyllosilicate.",vertus:"Contient du lithium naturel aux propriétés apaisantes reconnues. Combat l'anxiété chronique et la dépression. Favorise un sommeil profond et réparateur. Aide lors des grandes transitions de vie (divorce, deuil, changement). Stabilise les humeurs.",purification:"Lumière de lune uniquement. Fragile, éviter absolument l'eau.",port:"Sous l'oreiller, pendentif, pierre de poche. Tenir dans la main en cas de crise d'anxiété.",mindat:"https://www.mindat.org/min-2381.html",wiki:"https://fr.wikipedia.org/wiki/L%C3%A9pidolite",color:"#C084FC"},
{id:19,gem:"🌊",name:"Aigue-Marine",tagline:"Courage, clarté & flot de communication",category:"Émotionnel",maux:["Communication","Courage","Peur","Gorge","Thyroïde","Stress","Prise de parole"],chakras:["Gorge","Cœur"],composition:"Béryl bleu-vert, silicate cyclique d'aluminium et de béryllium. Be₃Al₂Si₆O₁₈.",vertus:"Donne le courage de s'exprimer authentiquement. Apaise la peur et le trac avant une prise de parole. Soulage les maux de gorge et les problèmes de thyroïde. Favorise la communication claire et la compassion. Pierre des marins et voyageurs (protection sur l'eau).",purification:"Eau courante, lumière de lune. Éviter le soleil prolongé (décoloration).",port:"Pendentif gorge, boucles d'oreilles. Tenir dans la main avant une prise de parole.",mindat:"https://www.mindat.org/min-570.html",wiki:"https://fr.wikipedia.org/wiki/Aigue-marine",color:"#22D3EE"},
{id:20,gem:"⬛",name:"Shungite",tagline:"Protection EMF & détoxification unique",category:"Physique",maux:["Ondes électromagnétiques","Protection","Détox","Eau","Fatigue chronique","Stress"],chakras:["Racine"],composition:"Minéral de carbone amorphe vieux de 2 milliards d'années, contient des fullerènes",vertus:"Protection exceptionnelle et scientifiquement étudiée contre les ondes électromagnétiques. Purifie et reminéralise l'eau (traditionnellement en Russie). Détoxifie l'organisme. Absorbe et neutralise les énergies négatives. Améliore la vitalité globale.",purification:"Eau courante uniquement. Ne pas charger autrement. S'entretient seule.",port:"Poser près des appareils électroniques. Bracelet, pierre de poche. Mettre en carafe pour purifier l'eau.",mindat:"https://www.mindat.org/min-3713.html",wiki:"https://fr.wikipedia.org/wiki/Shungite",color:"#374151"},
{id:21,gem:"🟣",name:"Charoïte",tagline:"Transformation spirituelle profonde & rare",category:"Spirituel",maux:["Transformation","Peur","Obsession","Rêves lucides","Acceptation","Ancrage spirituel"],chakras:["Couronne","Troisième œil","Cœur"],composition:"Silicate de calcium, potassium et baryum. Gisement unique en Sibérie.",vertus:"Pierre de transformation spirituelle profonde et accélérée. Surmonte les peurs existentielles. Combat les pensées obsessionnelles. Favorise les rêves lucides et l'exploration intérieure. Relie le monde spirituel au monde terrestre de manière équilibrée.",purification:"Lumière de lune, encens de résine. Éviter l'eau prolongée.",port:"Pendentif, pierre de méditation. Tenir dans la main lors des séances de travail intérieur.",mindat:"https://www.mindat.org/min-997.html",wiki:"https://fr.wikipedia.org/wiki/Cha%C3%AFte",color:"#7C3AED"},
{id:22,gem:"🌟",name:"Pyrite",tagline:"Abondance dorée & protection mentale",category:"Physique",maux:["Abondance","Protection","Fatigue intellectuelle","Confiance","Prospérité","Mémoire"],chakras:["Plexus solaire","Sacré"],composition:"Sulfure de fer FeS₂, cristallisation cubique, éclat métallique doré (or des fous)",vertus:"Attire l'abondance et la prospérité matérielle. Protège contre les manipulations et énergies négatives. Stimule la mémoire et la concentration. Redonne confiance et combativité. Symbole de richesse et de force dans de nombreuses traditions.",purification:"JAMAIS dans l'eau (oxydation et rouille). Encens, lumière dorée, terre sèche uniquement.",port:"Sur le bureau ou lieu de travail. Bracelet, poche. Ne jamais mouiller.",mindat:"https://www.mindat.org/min-3314.html",wiki:"https://fr.wikipedia.org/wiki/Pyrite",color:"#CA8A04"},
{id:23,gem:"🔮",name:"Fluorite",tagline:"Concentration, clarté & détox mentale",category:"Spirituel",maux:["Concentration","Clarté mentale","Apprentissage","Détox aura","Douleurs articulaires","Examens"],chakras:["Troisième œil","Couronne","Cœur"],composition:"Fluorure de calcium CaF₂, système cubique. Multicolore selon les impuretés présentes.",vertus:"Améliore drastiquement la concentration et la mémorisation. Nettoie et stabilise l'aura. Stabilise les émotions lors des périodes de stress intense. Soulage les douleurs articulaires. Indispensable pour les étudiants et les travailleurs intellectuels. Détoxifie le mental.",purification:"Eau courante brève, lumière de lune. Fragile mécaniquement, éviter les chocs.",port:"Sur le bureau d'étude, pendentif, bracelet. Tenir dans la main gauche pour étudier.",mindat:"https://www.mindat.org/min-1576.html",wiki:"https://fr.wikipedia.org/wiki/Fluorite",color:"#8B5CF6"},
{id:24,gem:"🌺",name:"Rhodonite",tagline:"Pardon, cicatrisation & amour propre",category:"Émotionnel",maux:["Pardon","Deuil","Estime de soi","Traumatisme","Colère","Rancœur","Relations"],chakras:["Cœur"],composition:"Silicate de manganèse MnSiO₃, rose avec veines noires d'oxydes de manganèse",vertus:"Pierre du pardon par excellence. Aide à surmonter les rancœurs et les colères profondes. Cicatrise les blessures émotionnelles. Développe l'amour propre et l'acceptation de soi. Soulage le deuil et les séparations douloureuses. Favorise la réconciliation.",purification:"Eau courante, lumière de lune, géode d'améthyste.",port:"Pendentif cœur, bracelet. Pierre de poche lors des périodes de deuil ou séparation.",mindat:"https://www.mindat.org/min-3418.html",wiki:"https://fr.wikipedia.org/wiki/Rhodonite",color:"#E11D48"},
{id:25,gem:"🕯️",name:"Sélénite",tagline:"Lumière angélique & purification totale",category:"Spirituel",maux:["Clarté","Méditation","Purification des pierres","Connexion spirituelle","Stress","Tensions"],chakras:["Couronne","Troisième œil"],composition:"Sulfate de calcium dihydraté CaSO₄·2H₂O, variété fibreuse translucide du gypse",vertus:"Purifie et recharge automatiquement toutes les autres pierres (poser dessus une nuit). Nettoie l'aura en passant la pierre autour du corps. Favorise la connexion aux guides et à l'intuition supérieure. Apporte clarté et paix profonde. Idéale pour les grilles cristallines.",purification:"JAMAIS dans l'eau (soluble). Lumière de lune, encens uniquement. S'entretient seule.",port:"Baguette pour nettoyer l'aura, poser sur le chakra couronne en méditation, plaque pour recharger.",mindat:"https://www.mindat.org/min-1641.html",wiki:"https://fr.wikipedia.org/wiki/S%C3%A9l%C3%A9nite_(min%C3%A9ral)",color:"#F0F9FF"},
{id:26,gem:"🔩",name:"Hématite",tagline:"Ancrage maximal & force intérieure",category:"Physique",maux:["Ancrage","Anémie","Fatigue","Protection","Confiance","Circulation sanguine","Vertiges"],chakras:["Racine"],composition:"Oxyde de fer Fe₂O₃, système trigonal, très dense et métallique argenté",vertus:"Ancrage au sol le plus puissant de la minéralogie. Soutient la production de globules rouges et combat l'anémie. Protège contre les agressions énergétiques extérieures. Renforce la confiance et la force intérieure. Soulage les vertiges et les nausées. Pierre des guerriers.",purification:"JAMAIS dans l'eau (rouille). Encens, lumière de lune, magnétite.",port:"Bracelet ou cheville gauche pour l'ancrage. Pierre dans la poche lors de vertiges.",mindat:"https://www.mindat.org/min-1856.html",wiki:"https://fr.wikipedia.org/wiki/H%C3%A9matite",color:"#6B7280"},
{id:27,gem:"🌈",name:"Amazonite",tagline:"Espoir, équilibre & communication du cœur",category:"Émotionnel",maux:["Communication","Espoir","Équilibre","Colère","Thyroïde","Stress électromagnétique"],chakras:["Gorge","Cœur"],composition:"Feldspath microcline vert-bleu, coloré par des inclusions de plomb et de fer",vertus:"Favorise la communication équilibrée entre cœur et esprit. Apaise la colère et le stress chronique. Donne espoir et optimisme face aux difficultés. Soutient la thyroïde et l'équilibre hormonal féminin. Protège des ondes électromagnétiques.",purification:"Eau courante, lumière de lune. Éviter le soleil direct.",port:"Pendentif gorge ou cœur, bracelet. Idéale pour les personnes qui ont du mal à s'exprimer.",mindat:"https://www.mindat.org/min-4.html",wiki:"https://fr.wikipedia.org/wiki/Amazonite",color:"#2DD4BF"},
{id:28,gem:"👁️",name:"Œil de Faucon",tagline:"Vision globale, hauteur & clairvoyance",category:"Spirituel",maux:["Clarté","Vision d'ensemble","Décision","Protection","Intuition","Confusion"],chakras:["Troisième œil","Gorge"],composition:"Variété bleue de l'œil de tigre, quartz fibreux pseudomorphe de crocidolite bleue",vertus:"Ouvre la vision globale des situations complexes. Aide aux prises de décision difficiles en voyant plus loin. Protège lors des voyages. Développe l'intuition et la clairvoyance. Combat la confusion mentale et les illusions. Pierre des stratèges et des dirigeants.",purification:"Eau courante, lumière de lune, fumigation.",port:"Pendentif, bracelet. Tenir dans la main lors des décisions importantes.",mindat:"https://www.mindat.org/min-3337.html",wiki:"https://fr.wikipedia.org/wiki/%C5%92il-de-faucon",color:"#0EA5E9"},
{id:29,gem:"💎",name:"Topaze Bleue",tagline:"Expression authentique & manifestation",category:"Spirituel",maux:["Expression","Communication","Clarté d'intention","Manifestation","Gorge","Confiance"],chakras:["Gorge","Troisième œil"],composition:"Silicate de fluor et d'aluminium Al₂SiO₄(F,OH)₂, système orthorhombique",vertus:"Stimule la communication et l'expression créative. Aide à manifester ses intentions avec clarté. Renforce la confiance en sa parole et ses idées. Soulage les maux de gorge chroniques. Favorise l'honnêteté et la transparence dans les relations.",purification:"Eau courante, lumière de lune. Éviter le soleil prolongé.",port:"Pendentif gorge, boucles d'oreilles. Tenir lors des présentations ou négociations.",mindat:"https://www.mindat.org/min-3977.html",wiki:"https://fr.wikipedia.org/wiki/Topaze",color:"#38BDF8"},
{id:30,gem:"🌱",name:"Moldavite",tagline:"Éveil accéléré & transformation cosmique",category:"Spirituel",maux:["Transformation rapide","Éveil spirituel","Changement de vie","Synchronicités","Intuition"],chakras:["Cœur","Troisième œil","Couronne"],composition:"Tektite verte — verre cosmique formé par impact météoritique il y a 14,7 millions d'années",vertus:"Pierre la plus puissante pour la transformation spirituelle rapide. Accélère l'évolution personnelle de manière parfois déstabilisante. Intensifie tous les phénomènes intuitifs et psychiques. Génère de nombreuses synchronicités. À utiliser avec précaution et accompagnement.",purification:"Lumière de lune, encens de résine. Très puissante — commencer par de courtes séances.",port:"Pendentif, méditation. Déconseillée aux débutants sans accompagnement. Commencer progressivement.",mindat:"https://www.mindat.org/min-2746.html",wiki:"https://fr.wikipedia.org/wiki/Moldavite",color:"#16A34A"},
{id:31,gem:"🌤️",name:"Pierre de Soleil",tagline:"Joie solaire, leadership & énergie positive",category:"Émotionnel",maux:["Dépression","Manque d'énergie","Leadership","Joie","Confiance","Vitalité"],chakras:["Plexus solaire","Sacré"],composition:"Feldspath oligoclase ou orthoclase avec inclusions d'hématite ou de goethite (aventurescence)",vertus:"Apporte joie de vivre et optimisme radieux. Stimule le leadership naturel et le charisme. Redonne énergie et enthousiasme. Combat la dépression et la léthargie. Développe l'indépendance et la force de caractère. Idéale en hiver contre la dépression saisonnière.",purification:"Lumière du soleil (quelques minutes). Eau courante, encens.",port:"Pendentif, bracelet. Porter en hiver ou lors de périodes morales difficiles.",mindat:"https://www.mindat.org/min-2387.html",wiki:"https://fr.wikipedia.org/wiki/Pierre_de_soleil",color:"#FBBF24"},
{id:32,gem:"🫧",name:"Célestite",tagline:"Paix céleste & connexion angélique",category:"Spirituel",maux:["Anxiété profonde","Connexion spirituelle","Paix intérieure","Communication spirituelle","Stress"],chakras:["Couronne","Gorge","Troisième œil"],composition:"Sulfate de strontium SrSO₄, système orthorhombique, bleu pâle à incolore",vertus:"Apporte une paix profonde et céleste. Favorise la connexion aux guides spirituels et anges. Calme les crises d'anxiété sévères. Développe la communication intuitive. Idéale pour les séances de channeling et méditation profonde. Adoucit les conflits.",purification:"Lumière de lune uniquement. Très fragile, JAMAIS dans l'eau. Éviter le soleil (décoloration).",port:"Près du lit, pierre de méditation. Tenir dans les mains en cas d'anxiété intense.",mindat:"https://www.mindat.org/min-926.html",wiki:"https://fr.wikipedia.org/wiki/C%C3%A9lestine_(min%C3%A9ral)",color:"#BAE6FD"},
{id:33,gem:"🟤",name:"Bronzite",tagline:"Décision, courtoisie & protection",category:"Émotionnel",maux:["Hésitation","Décision","Protection","Confiance","Agressivité","Politesse"],chakras:["Racine","Plexus solaire"],composition:"Pyroxène ferromagnésien (enstatite ferreux), éclat bronzé sub-métallique",vertus:"Aide à prendre des décisions fermes et définitives. Renvoie les énergies négatives à leur source. Développe la courtoisie et la politesse dans les interactions. Donne confiance et assurance. Combat l'hésitation chronique et l'indécision paralysante.",purification:"Eau courante, encens, lumière du soleil.",port:"Poche, bracelet. Utile lors des négociations et situations conflictuelles.",mindat:"https://www.mindat.org/min-4305.html",wiki:"https://fr.wikipedia.org/wiki/Bronzite",color:"#92400E"},
{id:34,gem:"🩵",name:"Apatite Bleue",tagline:"Motivation, communication & éclaircissement",category:"Spirituel",maux:["Motivation","Communication","Apprentissage","Appétit","Surpoids","Clarté"],chakras:["Gorge","Troisième œil"],composition:"Phosphate de calcium Ca₅(PO₄)₃(F,Cl,OH), système hexagonal",vertus:"Stimule la motivation et l'ambition. Favorise l'apprentissage et la mémorisation. Régule l'appétit (aide au contrôle du poids). Clarifie les pensées confuses. Développe le don de communication. Ouvre l'esprit aux nouvelles idées et perspectives.",purification:"Eau courante brève uniquement. Lumière de lune, encens.",port:"Pendentif, bracelet. Tenir lors des études ou apprentissages.",mindat:"https://www.mindat.org/min-300.html",wiki:"https://fr.wikipedia.org/wiki/Apatite",color:"#38BDF8"},
{id:35,gem:"🌋",name:"Obsidienne Dorée",tagline:"Connexion spirituelle & vérité divine",category:"Spirituel",maux:["Scrying","Clairvoyance","Protection","Vérité","Connexion supérieure","Blocages spirituels"],chakras:["Plexus solaire","Troisième œil"],composition:"Verre volcanique avec inclusions de cristaux de magnétite créant des reflets dorés",vertus:"Utilisée traditionnellement pour la scrutation (divination dans les miroirs noirs). Développe la clairvoyance et les visions. Protège lors des voyages astraux. Révèle les vérités cachées avec douceur. Connecte à une guidance supérieure.",purification:"Eau courante, encens de résine, lumière de lune.",port:"Pendentif, miroir de scrutation. Pierre de méditation avancée.",mindat:"https://www.mindat.org/min-2950.html",wiki:"https://fr.wikipedia.org/wiki/Obsidienne",color:"#CA8A04"},
{id:36,gem:"🧿",name:"Œil de Chat (Chrysoberyl)",tagline:"Protection & chance intuitive",category:"Spirituel",maux:["Protection","Chance","Intuition","Mauvais œil","Jalousie","Richesse"],chakras:["Plexus solaire","Troisième œil"],composition:"Chrysoberyl BeAl₂O₄ avec inclusions en aiguilles parallèles créant l'effet chatoyant",vertus:"Protection très puissante contre le mauvais œil et la jalousie. Porte bonheur et attire la chance. Développe l'intuition et la perception fine. Protège la richesse accumulée. Utilisé depuis l'Antiquité comme amulette protectrice.",purification:"Eau courante, lumière de lune, encens.",port:"Bague ou pendentif. Traditionnellement porté en bague à l'index.",mindat:"https://www.mindat.org/min-1016.html",wiki:"https://fr.wikipedia.org/wiki/Chrysob%C3%A9ryl",color:"#D97706"},
{id:37,gem:"💫",name:"Iolite",tagline:"Vision intérieure & chemin de l'âme",category:"Spirituel",maux:["Clairvoyance","Direction de vie","Désintoxication","Foie","Alcool","Boussole intérieure"],chakras:["Troisième œil","Couronne"],composition:"Silicate de magnésium, fer et aluminium (cordiérite), fort pléochroïsme bleu-violet",vertus:"Puissante pierre de vision intérieure. Aide à trouver sa direction de vie authentique. Favorise la désintoxication (alcool, drogues). Soutient le foie. Développe les capacités de clairvoyance. Guidait autrefois les navigateurs vikings (utilisée comme filtre polarisant).",purification:"Eau courante, lumière de lune.",port:"Pendentif, bracelet. Méditation pour trouver sa voie.",mindat:"https://www.mindat.org/min-1008.html",wiki:"https://fr.wikipedia.org/wiki/Cord%C3%A9rite",color:"#6366F1"},
{id:38,gem:"🪩",name:"Labradorite Spectrolite",tagline:"Magie intense & transformation profonde",category:"Spirituel",maux:["Transformation","Magie","Protection renforcée","Intuition avancée","Synchronicités"],chakras:["Tous les chakras"],composition:"Variété de labradorite finlandaise à labradorescence exceptionnelle couvrant tout le spectre",vertus:"Version la plus puissante de la labradorite. Protection et transformation encore plus intenses. Révèle toute la palette des capacités intuitives. Génère de nombreuses synchronicités. Pierre rare prisée des praticiens avancés.",purification:"Lumière de lune, encens de résine. Éviter l'eau.",port:"Pendentif, méditation. Réservée aux pratiquants expérimentés.",mindat:"https://www.mindat.org/min-2362.html",wiki:"https://fr.wikipedia.org/wiki/Labradorite",color:"#4F46E5"},
{id:39,gem:"🌙",name:"Pierre de Lune Arc-en-Ciel",tagline:"Magie divine & cycles sacrés",category:"Spirituel",maux:["Intuition profonde","Cycles","Féminité sacrée","Magie","Protection divine"],chakras:["Couronne","Tous les chakras"],composition:"Feldspath orthose de haute qualité avec reflets multicolores sur fond blanc translucide",vertus:"Version premium de la pierre de lune avec des reflets irisés multicolores. Renforce toutes les qualités de la pierre de lune standard. Intensifie la connexion à l'énergie lunaire divine. Amplifie la magie personnelle. Protection divine lors des périodes de transition.",purification:"Lumière de pleine lune uniquement. Traiter avec la plus grande délicatesse.",port:"Pendentif précieux, méditation. Porter lors des pleines lunes.",mindat:"https://www.mindat.org/min-3.html",wiki:"https://fr.wikipedia.org/wiki/Pierre_de_lune",color:"#E0F2FE"},
{id:40,gem:"🩶",name:"Labradorite Blanche (Perle de Lune)",tagline:"Douceur spirituelle & pureté",category:"Spirituel",maux:["Douceur","Pureté","Féminité","Intuition douce","Stress","Maternité"],chakras:["Couronne","Cœur"],composition:"Orthoclase blanc à reflets nacrés (adulaire), variété de pierre de lune moins commune",vertus:"Apporte douceur et pureté spirituelle. Féminité sacrée et maternelle. Intuition douce et progressive. Idéale pour les femmes enceintes et les jeunes mères. Apaise les nourrissons (poser près du berceau).",purification:"Lumière de lune, encens doux. Éviter l'eau.",port:"Pendentif doux, bracelet pour femmes enceintes.",mindat:"https://www.mindat.org/min-3.html",wiki:"https://fr.wikipedia.org/wiki/Pierre_de_lune",color:"#F1F5F9"},
{id:41,gem:"💚",name:"Jade Néphrite",tagline:"Harmonie, chance & longévité",category:"Émotionnel",maux:["Chance","Harmonie","Longévité","Rêves","Protection","Abondance","Reins"],chakras:["Cœur"],composition:"Silicate de calcium et magnésium Ca₂Mg₅Si₈O₂₂(OH)₂ (amphibole actinolite), vert foncé",vertus:"Pierre sacrée en Asie depuis 7000 ans. Apporte chance, harmonie et longévité. Favorise les rêves prémonitoires. Protège et guide. Soutient les reins et le système urinaire. Attire l'abondance et la prospérité. Pierre de sagesse et de noblesse.",purification:"Eau courante, lumière de lune.",port:"Bracelet (tradition chinoise), pendentif, bague. Sculpté en amulettes.",mindat:"https://www.mindat.org/min-14.html",wiki:"https://fr.wikipedia.org/wiki/Jade",color:"#166534"},
{id:42,gem:"💚",name:"Jade Jadéite",tagline:"Imperial jade — pureté & pouvoir",category:"Spirituel",maux:["Pureté","Pouvoir","Protection royale","Longévité","Sagesse","Chance suprême"],chakras:["Cœur","Couronne"],composition:"Silicate de sodium et aluminium NaAlSi₂O₆ (pyroxène), plus rare et précieux que la néphrite",vertus:"Le jade impérial — le plus précieux. Protection et pureté absolues. Connecte à la sagesse ancestrale. Symbole de pouvoir et de noblesse en Asie. Favorise la sagesse divine. Beaucoup plus rare et énergétiquement plus puissant que la néphrite.",purification:"Eau courante très brève, lumière de lune.",port:"Bijoux précieux, pendentif, sculpture.",mindat:"https://www.mindat.org/min-2062.html",wiki:"https://fr.wikipedia.org/wiki/Jade",color:"#15803D"},
{id:43,gem:"🔵",name:"Kyanite Bleue",tagline:"Alignement instantané & communication pure",category:"Spirituel",maux:["Alignement des chakras","Communication","Méditation","Rêves lucides","Colère"],chakras:["Gorge","Troisième œil","Tous"],composition:"Silicate d'aluminium Al₂SiO₅, système triclinique, clivage parfait en lames bleues",vertus:"Aligne tous les chakras spontanément sans purification nécessaire. Favorise la communication psychique et médiumnique. Ne retient JAMAIS les énergies négatives (autonettoyante). Favorise les rêves lucides. Calme la colère instantanément. Idéale pour les thérapeutes.",purification:"AUCUNE purification nécessaire. Ne se charge jamais négativement.",port:"Pendant les soins ou méditations. Poser sur chaque chakra en séquence.",mindat:"https://www.mindat.org/min-2328.html",wiki:"https://fr.wikipedia.org/wiki/Cyanite",color:"#1D4ED8"},
{id:44,gem:"🖤",name:"Obsidienne Acajou",tagline:"Ancrage doux & libération des blocages",category:"Émotionnel",maux:["Blocages profonds","Honte","Culpabilité","Ancrage","Libération","Auto-sabotage"],chakras:["Racine","Sacré"],composition:"Verre volcanique avec inclusions d'oxyde de fer rouge-brun (acajou), moins vitreux",vertus:"Version plus douce de l'obsidienne noire. Libère les blocages de honte et culpabilité. Combat l'auto-sabotage. Révèle les vérités cachées progressivement. Ancrage doux mais efficace. Recommandée avant l'obsidienne noire pour les personnes sensibles.",purification:"Eau courante, terre, encens.",port:"Pierre de poche, bracelet. Bon point de départ pour le travail sur les blocages.",mindat:"https://www.mindat.org/min-2950.html",wiki:"https://fr.wikipedia.org/wiki/Obsidienne",color:"#7C2D12"},
{id:45,gem:"🌸",name:"Morganite",tagline:"Amour divin & guérison douce du cœur",category:"Émotionnel",maux:["Amour divin","Guérison cœur","Compassion","Stress","Relations","Anxiété douce"],chakras:["Cœur","Couronne"],composition:"Béryl rose coloré par des traces de manganèse, système hexagonal",vertus:"Apporte l'amour divin et la compassion universelle. Guérison douce et profonde du cœur. Développe la compassion envers soi et les autres. Apaise le stress chronique par une énergie très douce. Favorise les relations harmonieuses et durables.",purification:"Eau courante, lumière de lune douce.",port:"Pendentif sur le cœur, bague. Idéale en début de travail émotionnel.",mindat:"https://www.mindat.org/min-2768.html",wiki:"https://fr.wikipedia.org/wiki/Morganite",color:"#FBCFE8"},
{id:46,gem:"🟢",name:"Prasiolite (Améthyste Verte)",tagline:"Connexion cœur-esprit & croissance",category:"Spirituel",maux:["Connexion cœur","Croissance spirituelle","Amour de soi","Forces intérieures","Addiction"],chakras:["Cœur","Couronne","Plexus solaire"],composition:"Quartz vert (améthyste transformée par chaleur), coloration par traces de fer",vertus:"Rare et précieuse. Connecte le chakra du cœur au chakra couronne. Amplifie les forces intérieures. Développe l'amour de soi. Aide à sortir des addictions. Stimule la croissance spirituelle depuis le cœur.",purification:"Eau courante, lumière de lune.",port:"Pendentif, méditation. Porter lors du travail sur l'amour de soi.",mindat:"https://www.mindat.org/min-198.html",wiki:"https://fr.wikipedia.org/wiki/Am%C3%A9thyste",color:"#86EFAC"},
{id:47,gem:"🩷",name:"Rhodochrosite",tagline:"Amour de soi & joie enfantine",category:"Émotionnel",maux:["Amour de soi","Enfant intérieur","Joie","Traumatisme enfance","Cœur","Créativité"],chakras:["Cœur","Plexus solaire"],composition:"Carbonate de manganèse MnCO₃, rose à rayures blanches, système trigonal",vertus:"Pierre de l'amour de soi par excellence. Reconnecte à l'enfant intérieur et à la joie pure. Guérit les traumatismes de l'enfance. Développe la créativité et la spontanéité. Apporte légèreté et bonheur. Stimule l'amour romantique.",purification:"Eau courante rapide, lumière de lune. Ne pas laisser tremper.",port:"Pendentif cœur, bracelet. Tenir lors du travail sur l'enfance.",mindat:"https://www.mindat.org/min-3409.html",wiki:"https://fr.wikipedia.org/wiki/Rhodochrosite",color:"#FB7185"},
{id:48,gem:"🟡",name:"Ambre",tagline:"Chaleur solaire, vitalité & purification",category:"Physique",maux:["Vitalité","Douleurs","Infections","Dépression","Mémoire","Dents (bébé)"],chakras:["Plexus solaire","Sacré"],composition:"Résine fossile végétale polymérisée (succinite), âgée de 30 à 90 millions d'années",vertus:"Transmet la chaleur et la vitalité solaire. Soulage les douleurs (arthrite, rhumatismes). Propriétés antibactériennes légères. Combat la dépression par son énergie chaleureuse. Stimule la mémoire. Traditionnel pour les poussées dentaires des bébés (ambre balte).",purification:"Lumière du soleil doux, encens. JAMAIS dans l'eau ni chaleur (fond, s'abîme).",port:"Bracelet, pendentif. Collier pour nourrissons (supervision adulte obligatoire).",mindat:"https://www.mindat.org/min-195.html",wiki:"https://fr.wikipedia.org/wiki/Ambre",color:"#D97706"},
{id:49,gem:"⚪",name:"Howlite",tagline:"Calme, patience & sommeil profond",category:"Émotionnel",maux:["Insomnie","Colère","Impatience","Stress","Anxiété","Communication"],chakras:["Couronne","Troisième œil"],composition:"Borosilicate de calcium Ca₂B₅SiO₉(OH)₅, blanc avec veines grises, très poreux",vertus:"Calme la colère et l'impatience instantanément. Favorise un sommeil profond (placer sous l'oreiller). Réduit le stress et l'anxiété. Développe la patience et la sérénité. Ouvre la réceptivité à la sagesse et l'apprentissage. Souvent teintée pour imiter la turquoise.",purification:"Eau courante rapide uniquement (poreux). Lumière de lune, encens.",port:"Sous l'oreiller pour le sommeil. Bracelet, pierre de poche.",mindat:"https://www.mindat.org/min-1924.html",wiki:"https://fr.wikipedia.org/wiki/Howlite",color:"#F1F5F9"},
{id:50,gem:"🟤",name:"Œil de Taureau",tagline:"Stabilité, chance & protection matérielle",category:"Émotionnel",maux:["Stabilité","Chance","Protection matérielle","Patience","Endurance","Finances"],chakras:["Racine","Sacré"],composition:"Quartz fibreux jaune-brun doré, variété de l'œil de tigre avec plus d'oxyde de fer",vertus:"Apporte stabilité et patience dans les situations longues. Attire la chance matérielle et financière. Protection des biens et possessions. Développe l'endurance et la persévérance. Ancre dans le présent et le concret. Idéal pour les entrepreneurs.",purification:"Eau courante, lumière du soleil.",port:"Poche, bracelet, porte-monnaie.",mindat:"https://www.mindat.org/min-3337.html",wiki:"https://fr.wikipedia.org/wiki/%C5%92il-de-tigre",color:"#B45309"},
{id:51,gem:"🔵",name:"Turquoise",tagline:"Protection ancestrale & communication sacrée",category:"Spirituel",maux:["Protection","Communication","Chance","Voyages","Leadership","Guérison"],chakras:["Gorge","Troisième œil"],composition:"Phosphate de cuivre et d'aluminium hydraté CuAl₆(PO₄)₄(OH)₈·4H₂O",vertus:"Une des plus anciennes pierres de protection de l'humanité (Égypte ancienne, peuples amérindiens). Protège lors des voyages. Favorise la communication sacrée et la guidance. Symbole de chance et de bénédiction. Soutient le système immunitaire.",purification:"Lumière de lune uniquement. JAMAIS dans l'eau (change de couleur). Éviter le soleil.",port:"Bijou traditionnel, pendentif, bracelet. Porter près de la gorge.",mindat:"https://www.mindat.org/min-4060.html",wiki:"https://fr.wikipedia.org/wiki/Turquoise_(min%C3%A9ral)",color:"#14B8A6"},
{id:52,gem:"🩵",name:"Calcite Bleue",tagline:"Communication douce & récupération",category:"Émotionnel",maux:["Convalescence","Communication","Relaxation","Tension artérielle","Anxiété","Gorge"],chakras:["Gorge","Troisième œil"],composition:"Carbonate de calcium CaCO₃ bleu pâle, système trigonal, clivage rhomboédrique parfait",vertus:"Facilite la récupération après maladie ou opération. Apaise les tensions et la pression artérielle. Favorise la communication douce et l'expression émotionnelle. Réduit l'anxiété progressivement. Idéale pour les convalescents.",purification:"Lumière de lune uniquement. JAMAIS dans l'eau (soluble à terme). Très fragile.",port:"Pierre de poche, poser sur la gorge. Chambre de convalescence.",mindat:"https://www.mindat.org/min-859.html",wiki:"https://fr.wikipedia.org/wiki/Calcite",color:"#7DD3FC"},
{id:53,gem:"💛",name:"Calcite Orange",tagline:"Créativité explosive & énergie sexuelle",category:"Physique",maux:["Créativité","Énergie","Sexualité","Joie","Dépression légère","Digestion"],chakras:["Sacré","Plexus solaire"],composition:"Carbonate de calcium CaCO₃ orange, coloré par des traces d'oxyde de fer",vertus:"Booste la créativité et l'énergie créatrice de manière explosive. Stimule la joie et l'enthousiasme. Réveil de la sexualité et du plaisir. Améliore la digestion. Combat la dépression légère par son énergie ensoleillée.",purification:"Lumière de lune uniquement. JAMAIS dans l'eau. Très fragile mécaniquement.",port:"Bureau créatif, atelier. Bracelet, pierre de poche.",mindat:"https://www.mindat.org/min-859.html",wiki:"https://fr.wikipedia.org/wiki/Calcite",color:"#FB923C"},
{id:54,gem:"💚",name:"Calcite Verte",tagline:"Renouveau, guérison & croissance",category:"Physique",maux:["Guérison","Renouveau","Fièvre","Infections","Cœur","Croissance"],chakras:["Cœur"],composition:"Carbonate de calcium CaCO₃ vert, coloré par des traces de chlorite ou de fer",vertus:"Facilite la guérison physique et émotionnelle. Apporte énergie de renouveau. Soulage les fièvres et infections. Ouvre le cœur à de nouvelles expériences. Favorise la croissance personnelle. Nettoie les vieilles croyances limitantes.",purification:"Lumière de lune. JAMAIS dans l'eau. Fragile.",port:"Poser sur le cœur ou zone douloureuse. Pierre de guérison.",mindat:"https://www.mindat.org/min-859.html",wiki:"https://fr.wikipedia.org/wiki/Calcite",color:"#4ADE80"},
{id:55,gem:"🌸",name:"Calcite Rose (Manganocalcite)",tagline:"Amour universel & guérison cardiaque",category:"Émotionnel",maux:["Amour","Cœur","Stress","Tension","Bienveillance","Trauma"],chakras:["Cœur"],composition:"Carbonate de calcium avec manganèse CaCO₃/MnCO₃, rose pâle, doux et translucide",vertus:"Apporte amour universel et compassion douce. Guérison progressive et en douceur du chakra cœur. Réduit le stress et les tensions chroniques. Développe la bienveillance. Alternative douce au quartz rose.",purification:"Lumière de lune. JAMAIS dans l'eau. Extrêmement fragile.",port:"Pendentif doux, pierre sur le cœur en méditation.",mindat:"https://www.mindat.org/min-859.html",wiki:"https://fr.wikipedia.org/wiki/Calcite",color:"#FCA5A5"},
{id:56,gem:"⬜",name:"Calcite Blanche",tagline:"Clarté, purification & recommencement",category:"Spirituel",maux:["Clarté","Purification","Recommencement","Confusion","Mémoire","Apprentissage"],chakras:["Couronne"],composition:"Carbonate de calcium CaCO₃ pur blanc, forme commune et abondante",vertus:"Clarifie l'esprit et élimine la confusion. Amplifie les énergies positives. Facilite l'apprentissage et la mémorisation. Accompagne les nouveaux départs et les transitions. Nettoie l'espace énergétique d'une pièce.",purification:"Lumière de lune. JAMAIS dans l'eau. Fragile.",port:"Pierre sur le bureau, chambre, espace de méditation.",mindat:"https://www.mindat.org/min-859.html",wiki:"https://fr.wikipedia.org/wiki/Calcite",color:"#F8FAFC"},
{id:57,gem:"🩷",name:"Danburite",tagline:"Amour angélique & éveil du cœur",category:"Spirituel",maux:["Éveil spirituel","Amour angélique","Détox","Allergies","Douceur","Sommeil"],chakras:["Couronne","Cœur"],composition:"Borosilicate de calcium CaB₂Si₂O₈, cristaux prismatiques incolores à roses",vertus:"Ouvre le cœur à l'amour angélique et divin. Favorise l'éveil spirituel en douceur. Propriétés détoxifiantes et anti-allergiques. Apporte douceur et sérénité. Favorise un sommeil angélique. Idéale pour les personnes en début de chemin spirituel.",purification:"Eau courante, lumière de lune.",port:"Pendentif, pierre de nuit. Idéale pour les enfants sensibles.",mindat:"https://www.mindat.org/min-1237.html",wiki:"https://fr.wikipedia.org/wiki/Danburite",color:"#FDF2F8"},
{id:58,gem:"🟣",name:"Sugilite",tagline:"Amour spirituel & protection psychique",category:"Spirituel",maux:["Protection psychique","Douleurs","Cancer (soutien)","Désespoir","Amour","Céphalées"],chakras:["Couronne","Troisième œil","Cœur"],composition:"Silicate cyclique de potassium, sodium, lithium et aluminium, violet intense",vertus:"Protection psychique très puissante. Soutien lors des maladies graves (accompagnement cancer). Apporte amour divin en période de désespoir. Soulage les maux de tête et céphalées chroniques. Développe le don de guérison. Pierre rare et précieuse.",purification:"Lumière de lune, encens de sauge. Éviter l'eau prolongée.",port:"Pendentif, pierre de soin. Tenir lors des séances de guérison.",mindat:"https://www.mindat.org/min-3831.html",wiki:"https://fr.wikipedia.org/wiki/Sugilite",color:"#6B21A8"},
{id:59,gem:"🟡",name:"Calcite Jaune (Miel)",tagline:"Clarté mentale & confiance ensoleillée",category:"Émotionnel",maux:["Confiance","Clarté","Motivation","Dépression légère","Fatigue mentale","Optimisme"],chakras:["Plexus solaire"],composition:"Carbonate de calcium CaCO₃ jaune miel, coloré par des hydroxydes de fer",vertus:"Apporte clarté mentale et confiance en ses capacités. Combat la dépression légère et la fatigue mentale. Stimule l'optimisme et la motivation. Énergie solaire douce et progressive. Idéale pour les personnes qui ont perdu confiance.",purification:"Lumière de lune. JAMAIS dans l'eau. Fragile.",port:"Bureau, poche. Bracelet pendant les périodes de doute.",mindat:"https://www.mindat.org/min-859.html",wiki:"https://fr.wikipedia.org/wiki/Calcite",color:"#FDE68A"},
{id:60,gem:"⚫",name:"Tectite Noire",tagline:"Ancrage cosmique & transformation karmique",category:"Spirituel",maux:["Karma","Transformation","Ancrage cosmique","Protection","Évolution rapide"],chakras:["Racine","Couronne"],composition:"Verre cosmique formé lors d'impacts météoritiques (différent de la moldavite)",vertus:"Connecte l'énergie cosmique au plan terrestre. Transformation karmique profonde. Ancrage solide lors des travaux spirituels intenses. Protection durant les voyages astraux. Accélère l'évolution spirituelle. Plus accessible que la moldavite.",purification:"Eau courante, lumière de lune, encens.",port:"Pierre de poche, méditation. Tenir lors des rituels d'ancrage.",mindat:"https://www.mindat.org/min-3944.html",wiki:"https://fr.wikipedia.org/wiki/Tectite",color:"#0C0A09"},
{id:61,gem:"🩵",name:"Dumortierite",tagline:"Patience, organisation & apprentissage",category:"Émotionnel",maux:["Organisation","Patience","Anxiété","Apprentissage","Têtus","Désintox"],chakras:["Gorge","Troisième œil"],composition:"Silicate d'aluminium et de bore Al₇BO₃(SiO₄)₃O₃, bleu violet intense",vertus:"Développe la patience et la tolérance envers soi et les autres. Améliore les capacités d'organisation et de planification. Favorise l'apprentissage et la mémorisation. Aide à la désintoxication. Apaise l'anxiété et la nervosité.",purification:"Eau courante, lumière de lune.",port:"Bracelet, pierre d'étude. Utile pour les personnes hyperactives.",mindat:"https://www.mindat.org/min-1327.html",wiki:"https://fr.wikipedia.org/wiki/Dumort%C3%A9rite",color:"#818CF8"},
{id:62,gem:"🟤",name:"Bois Pétrifié",tagline:"Ancrage ancestral & patience naturelle",category:"Physique",maux:["Ancrage","Patience","Passé","Ancestral","Stabilité","Sécurité"],chakras:["Racine"],composition:"Bois fossilisé remplacé par de la silice (quartz) sur des millions d'années",vertus:"L'ancrage le plus profond et le plus stable qui soit. Connecte à la sagesse ancestrale et aux cycles naturels. Développe une patience infinie. Apporte sentiment de sécurité et de permanence. Idéale pour les personnes qui se sentent instables ou déracinées.",purification:"Eau courante, terre, soleil.",port:"Pierre de poche, sur le sol de la maison. Tenir lors des crises de panique.",mindat:"https://www.mindat.org/min-29279.html",wiki:"https://fr.wikipedia.org/wiki/Bois_p%C3%A9trifi%C3%A9",color:"#92400E"},
{id:63,gem:"🟢",name:"Apophyllite Verte",tagline:"Connexion nature & guérison universelle",category:"Spirituel",maux:["Connexion nature","Guérison","Anxiété","Respiration","Asthme","Bienveillance"],chakras:["Cœur","Couronne"],composition:"Phyllosilicate de potassium, calcium, sodium et fluor, cristaux pyramidaux translucides",vertus:"Connexion profonde à l'énergie de la nature et des dévas. Guérison universelle et douce. Soulage l'anxiété et les troubles respiratoires. Apporte la paix et la bienveillance. Idéale pour les guérisseurs et thérapeutes.",purification:"Lumière de lune uniquement. JAMAIS dans l'eau. Très fragile.",port:"Pierre de soins, espace de méditation. Poser sur la poitrine lors de difficultés respiratoires.",mindat:"https://www.mindat.org/min-305.html",wiki:"https://fr.wikipedia.org/wiki/Apophyllite",color:"#86EFAC"},
{id:64,gem:"⬜",name:"Apophyllite Blanche",tagline:"Pureté céleste & connexion divine",category:"Spirituel",maux:["Connexion divine","Pureté","Méditation","Anges","Clarté","Éveil"],chakras:["Couronne","Troisième œil"],composition:"Phyllosilicate de potassium, calcium et fluor, cristaux pyramidaux incolores à blancs",vertus:"Connexion aux royaumes angéliques et divins. Pureté et clarté spirituelle intense. Catalyseur puissant pour la méditation et l'éveil. Ouvre le canal supérieur. Amplifie toutes les énergies de guérison. Pierre des espaces sacrés.",purification:"Lumière de lune. JAMAIS dans l'eau. Extrêmement fragile.",port:"Grille cristalline, espace de méditation, altar.",mindat:"https://www.mindat.org/min-305.html",wiki:"https://fr.wikipedia.org/wiki/Apophyllite",color:"#FFFFFF"},
{id:65,gem:"🔵",name:"Lazulite",tagline:"Esprit supérieur & raisonnement pur",category:"Spirituel",maux:["Intelligence","Raisonnement","Migraine","Paix mentale","Obsession","Méditation"],chakras:["Troisième œil","Couronne"],composition:"Phosphate de magnésium, fer et aluminium (Mg,Fe)Al₂(PO₄)₂(OH)₂, bleu royal",vertus:"Stimule les capacités intellectuelles supérieures. Favorise le raisonnement pur et objectif. Soulage les migraines et les obsessions mentales. Apporte paix et clarté au mental agité. Développe la sagesse et la clairvoyance intellectuelle.",purification:"Eau courante, lumière de lune.",port:"Pendentif front, pierre de méditation intellectuelle.",mindat:"https://www.mindat.org/min-2375.html",wiki:"https://fr.wikipedia.org/wiki/Lazulite",color:"#1D4ED8"},
{id:66,gem:"🟣",name:"Améthyste Chevron",tagline:"Puissance amplifiée & vision intérieure",category:"Spirituel",maux:["Méditation profonde","Vision","Addictions","Protection renforcée","Intuition forte"],chakras:["Troisième œil","Couronne"],composition:"Améthyste et quartz blanc en couches alternées (chevrons), système trigonal",vertus:"Version encore plus puissante de l'améthyste. Visions intérieures plus intenses. Travail sur les addictions renforcé. Protection plus forte. Méditation profonde facilitée. Idéale pour les praticiens expérimentés.",purification:"Eau courante, lumière de lune. Éviter le soleil.",port:"Pierre de méditation, pendentif. Pour pratiquants avancés.",mindat:"https://www.mindat.org/min-198.html",wiki:"https://fr.wikipedia.org/wiki/Am%C3%A9thyste",color:"#7C3AED"},
{id:67,gem:"🌊",name:"Chrysocolle",tagline:"Communication féminine & guérison de la terre",category:"Émotionnel",maux:["Communication douce","Hormones","SPM","Culpabilité","Féminité","Colère féminine"],chakras:["Gorge","Cœur"],composition:"Silicate de cuivre hydraté CuSiO₃·nH₂O, bleu-vert, structure amorphe",vertus:"Pierre de la communication féminine douce et apaisante. Régule les hormones féminines et soulage le SPM. Libère la culpabilité et la honte. Apaise la colère refoulée. Renforce la féminité naturelle. Connexion à l'énergie guérisseuse de la Terre.",purification:"Lumière de lune, encens. Ne pas laisser tremper (fragile).",port:"Pendentif gorge, bracelet. Particulièrement pour les femmes.",mindat:"https://www.mindat.org/min-1088.html",wiki:"https://fr.wikipedia.org/wiki/Chrysocolle",color:"#06B6D4"},
{id:68,gem:"🩶",name:"Larimar",tagline:"Sérénité des Caraïbes & communication divine",category:"Émotionnel",maux:["Stress intense","Communication","Phobies","Bipolarité","Paix","Féminité"],chakras:["Gorge","Cœur","Troisième œil"],composition:"Pectolite bleue NaCa₂Si₃O₈(OH), trouvée uniquement en République Dominicaine",vertus:"Énergie de la mer des Caraïbes. Dissout le stress et les tensions les plus profondes. Apaise les phobies et angoisses. Favorise la communication authentique avec douceur. Équilibre le féminin. Très rare et précieux.",purification:"Eau courante, lumière de lune.",port:"Pendentif, bracelet. Pierre de vacances et de ressourcement.",mindat:"https://www.mindat.org/min-2356.html",wiki:"https://fr.wikipedia.org/wiki/Larimar",color:"#7DD3FC"},
{id:69,gem:"🟡",name:"Héliolite (Pierre de Soleil Oregon)",tagline:"Joie authentique & liberté de l'âme",category:"Émotionnel",maux:["Joie","Liberté","Leadership","Égoïsme sain","Confiance","Bonheur"],chakras:["Sacré","Plexus solaire"],composition:"Feldspath oligoclase avec inclusions de cuivre natif, aventurescence rouge-or, Oregon USA",vertus:"Joie authentique et liberté de l'âme. Développe un égoïsme sain (s'accorder la priorité). Renforce le leadership par la joie. Apporte bonheur et légèreté durable. Dissout les sentiments d'infériorité.",purification:"Lumière du soleil doux, eau courante.",port:"Pendentif, bracelet. Porter lors des événements sociaux.",mindat:"https://www.mindat.org/min-2387.html",wiki:"https://fr.wikipedia.org/wiki/Pierre_de_soleil",color:"#F59E0B"},
{id:70,gem:"🔵",name:"Hémimorphite",tagline:"Empathie, compassion & communication du cœur",category:"Émotionnel",maux:["Empathie","Compassion","Ego","Égocentrisme","Bien-être émotionnel","Communication sincère"],chakras:["Cœur","Gorge"],composition:"Silicate de zinc hydraté Zn₄Si₂O₇(OH)₂·H₂O, bleu-vert à blanc",vertus:"Développe l'empathie et la compassion authentique. Réduit l'égocentrisme et l'ego excessif. Favorise la communication sincère depuis le cœur. Apporte bien-être émotionnel et équanimité. Aide à voir le point de vue des autres.",purification:"Eau courante brève, lumière de lune.",port:"Pendentif, bracelet. Utile pour les personnes très égocentriques.",mindat:"https://www.mindat.org/min-1864.html",wiki:"https://fr.wikipedia.org/wiki/H%C3%A9mimorphite",color:"#38BDF8"},
{id:71,gem:"⬛",name:"Hypersthène",tagline:"Introspection profonde & résolution de problèmes",category:"Spirituel",maux:["Introspection","Résolution","Fatigue","Surcharge sensorielle","Méditation"],chakras:["Troisième œil","Racine"],composition:"Pyroxène ferromagnésien (Fe,Mg)SiO₃, gris foncé à brun avec éclat sub-métallique",vertus:"Facilite l'introspection profonde et la résolution de problèmes complexes. Soulage la fatigue mentale et la surcharge sensorielle. Favorise une méditation profonde et ancrée. Développe le discernement et l'analyse fine. Pierre des chercheurs et penseurs.",purification:"Eau courante, encens, lumière de lune.",port:"Pierre de méditation, bureau d'étude. Tenir lors de prises de décisions complexes.",mindat:"https://www.mindat.org/min-2073.html",wiki:"https://fr.wikipedia.org/wiki/Hypersth%C3%A8ne",color:"#374151"},
{id:72,gem:"🩵",name:"Smithsonite",tagline:"Douceur & soulagement des tensions",category:"Émotionnel",maux:["Stress","Douceur","Alcool","Addictions légères","Enfance","Sécurité émotionnelle"],chakras:["Cœur","Plexus solaire"],composition:"Carbonate de zinc ZnCO₃, bleu-vert à rose selon les impuretés, système trigonal",vertus:"Apporte douceur et soulagement des tensions accumulées. Aide à sortir des addictions légères (tabac, sucre). Reconnecte à la sécurité émotionnelle de l'enfance. Développe la douceur envers soi-même. Idéale pour les personnes très dures avec elles-mêmes.",purification:"Eau courante brève uniquement. Lumière de lune, encens.",port:"Pierre de poche, pendentif. Tenir lors des moments de sevrage.",mindat:"https://www.mindat.org/min-3697.html",wiki:"https://fr.wikipedia.org/wiki/Smithsonite",color:"#7DD3FC"},
{id:73,gem:"🟢",name:"Péridot",tagline:"Légèreté, renouveau & purification du cœur",category:"Émotionnel",maux:["Jalousie","Colère","Stress","Digestion","Cœur","Renouveau","Dépendances"],chakras:["Cœur","Plexus solaire"],composition:"Silicate de magnésium et fer (Mg,Fe)₂SiO₄ (olivine gemme), vert citron à olive",vertus:"Libère de la jalousie, de la colère et du ressentiment. Apporte légèreté et renouveau. Purifie le chakra cœur en profondeur. Améliore la digestion. Soulage le stress et les tensions. Idéale lors des transitions de vie printanières.",purification:"Eau courante, lumière du soleil modérée.",port:"Pendentif, bague, bracelet. Particulièrement efficace au printemps.",mindat:"https://www.mindat.org/min-2730.html",wiki:"https://fr.wikipedia.org/wiki/P%C3%A9ridot",color:"#4D7C0F"},
{id:74,gem:"🔴",name:"Rubis",tagline:"Passion royale, vitalité & amour ardent",category:"Physique",maux:["Vitalité","Passion","Libido","Cœur physique","Courage","Leadership"],chakras:["Racine","Cœur"],composition:"Corindon rouge Al₂O₃ coloré par le chrome (Cr³⁺), système trigonal, dureté 9",vertus:"Pierre de la passion et du courage royal. Stimule la vitalité et l'énergie vitale. Renforce la libido et le désir. Fortifie le cœur physique et la circulation. Donne courage et force dans les épreuves. Pierre des rois et des guerriers.",purification:"Eau courante, lumière du soleil, encens.",port:"Bague, pendentif. Porter à droite pour l'énergie, à gauche pour la protection.",mindat:"https://www.mindat.org/min-3473.html",wiki:"https://fr.wikipedia.org/wiki/Rubis",color:"#BE123C"},
{id:75,gem:"💚",name:"Émeraude",tagline:"Amour divin, abondance & guérison profonde",category:"Émotionnel",maux:["Amour","Abondance","Guérison","Yeux","Fidélité","Intuition"],chakras:["Cœur"],composition:"Béryl vert coloré par le chrome (Cr) ou le vanadium (V), système hexagonal",vertus:"Pierre de l'amour divin et de la fidélité. Abondance et prospérité. Guérison profonde du cœur. Soutient la santé des yeux. Développe l'intuition et la prescience. Pierre sacrée d'Hermès Trismégiste et de nombreuses traditions.",purification:"Eau courante, lumière de lune.",port:"Bague, pendentif. Bijou précieux de valeur.",mindat:"https://www.mindat.org/min-570.html",wiki:"https://fr.wikipedia.org/wiki/%C3%89meraude",color:"#059669"},
{id:76,gem:"🔵",name:"Saphir Bleu",tagline:"Sagesse divine, dévotion & mental pur",category:"Spirituel",maux:["Sagesse","Dévotion","Dépression","Mental","Insomnie","Vérité"],chakras:["Troisième œil","Gorge","Couronne"],composition:"Corindon bleu Al₂O₃ coloré par le titane et le fer, dureté 9",vertus:"Pierre de la sagesse divine et de la dévotion spirituelle. Clarifie et purifie le mental. Combat la dépression. Favorise le sommeil des personnes aux pensées envahissantes. Développe la clairvoyance et l'accès à la vérité supérieure.",purification:"Eau courante, lumière de lune, encens.",port:"Bague, pendentif. Pierre précieuse traditionnellement portée par les religieux.",mindat:"https://www.mindat.org/min-3473.html",wiki:"https://fr.wikipedia.org/wiki/Saphir",color:"#1D4ED8"},
{id:77,gem:"💎",name:"Diamant",tagline:"Pureté absolue & force invincible",category:"Spirituel",maux:["Force","Pureté","Engagement","Clarté absolue","Courage","Lumière"],chakras:["Tous les chakras","Couronne"],composition:"Carbone pur C en structure cubique, minéral le plus dur de la nature (dureté 10)",vertus:"Symbole de pureté absolue et de force invincible. Amplifie toutes les énergies (positives ET négatives — à manier avec discernement). Renforce l'engagement et la fidélité. Clarifie toutes les situations. Pierre de la lumière divine.",purification:"Eau courante, lumière du soleil. Attention à l'amplification des énergies négatives.",port:"Bijou précieux traditionnel. Symbole d'engagement et de pureté.",mindat:"https://www.mindat.org/min-1282.html",wiki:"https://fr.wikipedia.org/wiki/Diamant",color:"#E0F2FE"},
{id:78,gem:"🟠",name:"Sardonyx",tagline:"Bonheur, mariage & force du caractère",category:"Émotionnel",maux:["Mariage","Bonheur conjugal","Force","Courage","Communication","Chance"],chakras:["Racine","Sacré"],composition:"Onyx et cornaline en couches alternées, quartz microcristallin rouge-brun et blanc",vertus:"Pierre traditionnelle du bonheur conjugal et des mariages heureux. Renforce la force de caractère. Apporte courage et persévérance. Favorise la communication dans les couples. Attire la chance dans les nouvelles entreprises.",purification:"Eau courante, lumière du soleil.",port:"Bague, pendentif. Traditionnel comme cadeau de mariage.",mindat:"https://www.mindat.org/min-3544.html",wiki:"https://fr.wikipedia.org/wiki/Sardonyx",color:"#B45309"},
{id:79,gem:"⬜",name:"Opale Blanche",tagline:"Créativité arc-en-ciel & espoir",category:"Spirituel",maux:["Créativité","Espoir","Spontanéité","Émotions","Imagination","Arts"],chakras:["Couronne","Tous"],composition:"Silice amorphe hydratée SiO₂·nH₂O avec jeu de couleurs (diffraction de la lumière)",vertus:"Stimule la créativité et l'imagination sous toutes leurs formes. Apporte espoir et spontanéité. Amplifie les émotions (à manipuler avec soin). Développe les arts et l'expression artistique. Pierre des artistes et des rêveurs.",purification:"Lumière de lune UNIQUEMENT. Extrêmement sensible (eau, chaleur, soleil la détruisent).",port:"Bijou avec grand soin. Éviter les chocs, la chaleur et l'eau. Pierre précieuse fragile.",mindat:"https://www.mindat.org/min-3004.html",wiki:"https://fr.wikipedia.org/wiki/Opale",color:"#F8FAFC"},
{id:80,gem:"🔥",name:"Opale de Feu",tagline:"Passion ardente, sexualité & créativité",category:"Physique",maux:["Passion","Sexualité","Créativité ardente","Énergie","Dépression","Libido"],chakras:["Sacré","Plexus solaire"],composition:"Opale orange-rouge translucide du Mexique, jeux de couleurs moins marqués",vertus:"Passion ardente et énergie sexuelle puissante. Stimule la créativité explosive et l'enthousiasme. Combat la dépression par son feu intérieur. Libère la spontanéité et le désir. Pierre des passionnés et des artistes de feu.",purification:"Lumière de lune. Éviter l'eau et le soleil intense.",port:"Pendentif, bague. Porter lors des créations artistiques.",mindat:"https://www.mindat.org/min-3004.html",wiki:"https://fr.wikipedia.org/wiki/Opale",color:"#F97316"},
{id:81,gem:"⚫",name:"Opale Noire",tagline:"Magie profonde & transformation du destin",category:"Spirituel",maux:["Magie","Destin","Protection occulte","Transformation","Pouvoir","Intuition max"],chakras:["Racine","Tous"],composition:"Opale précieuse sur fond sombre (noirci), jeu de couleurs intense, Lightning Ridge Australie",vertus:"La plus puissante et précieuse des opales. Magie profonde et protection occulte maximale. Transformation du destin. Amplification de toutes les capacités intuitives. Attire et peut transformer la chance. Réservée aux praticiens expérimentés.",purification:"Lumière de lune uniquement. Extrêmement précieuse et fragile.",port:"Bijou précieux avec grand soin. Pour pratiquants avancés seulement.",mindat:"https://www.mindat.org/min-3004.html",wiki:"https://fr.wikipedia.org/wiki/Opale",color:"#0C0A09"},
{id:82,gem:"🩶",name:"Marcassite",tagline:"Réflexion, clarté mentale & ancrage",category:"Physique",maux:["Clarté","Réflexion","Concentration","Énergie physique","Confiance","Ancrage doux"],chakras:["Plexus solaire","Racine"],composition:"Sulfure de fer FeS₂ (dimorphe de la pyrite), cristaux orthorhombiques, éclat métallique",vertus:"Favorise la réflexion et la clarté mentale. Stimule l'énergie physique. Renforce la confiance par la raison. Ancrage doux et progressif. Idéale pour les personnes qui ont besoin de structure et de clarté dans leurs pensées.",purification:"JAMAIS dans l'eau (s'oxyde très vite). Encens uniquement.",port:"Bijou vintage, bracelet. Très utilisée en joaillerie ancienne.",mindat:"https://www.mindat.org/min-2567.html",wiki:"https://fr.wikipedia.org/wiki/Marcassite",color:"#9CA3AF"},
{id:83,gem:"🟤",name:"Septaria",tagline:"Communication & harmonie groupale",category:"Émotionnel",maux:["Communication","Groupe","Harmonie","Tolérance","Leadership doux","Patience"],chakras:["Racine","Sacré","Plexus solaire"],composition:"Concrétions de calcite, aragonite et argile (limonite), motif géodique caractéristique",vertus:"Favorise la communication harmonieuse dans les groupes et équipes. Développe la tolérance et la patience envers les différences. Leadership doux et rassembleur. Apporte harmonie dans les espaces de vie. Pierre idéale pour les entreprises et espaces collectifs.",purification:"Eau courante brève, encens.",port:"Pierre dans les espaces communs, salle de réunion. Pendentif, bracelet.",mindat:"https://www.mindat.org/min-29274.html",wiki:"https://fr.wikipedia.org/wiki/Septaria",color:"#92400E"},
