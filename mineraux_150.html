{id:84,gem:"🌿",name:"Pétrifiée (Bois) Verte",tagline:"Croissance & renouveau naturel",category:"Physique",maux:["Croissance","Renouveau","Ancrage","Nature","Guérison lente","Patience"],chakras:["Cœur","Racine"],composition:"Bois fossilisé remplacé par de la silice verte (chlorite ou céladonite incluse)",vertus:"Apporte l'énergie de croissance et de renouveau de la nature. Connexion profonde à l'énergie végétale et tellurique. Ancrage doux combiné à l'ouverture du cœur. Guérison lente mais profonde et durable.",purification:"Eau courante, terre, lumière naturelle.",port:"Pierre de jardin, espace naturel. Pendentif nature.",mindat:"https://www.mindat.org/min-29279.html",wiki:"https://fr.wikipedia.org/wiki/Bois_p%C3%A9trifi%C3%A9",color:"#16A34A"},
{id:85,gem:"🔵",name:"Aigue-Marine de Santa Maria",tagline:"Communication cristalline & clarté suprême",category:"Émotionnel",maux:["Communication profonde","Clarté absolue","Courage","Gorge","Thyroïde","Vérité"],chakras:["Gorge","Cœur","Troisième œil"],composition:"Béryl bleu de qualité exceptionnelle (mine de Santa Maria au Brésil), bleu intense",vertus:"Version premium de l'aigue-marine. Communication encore plus cristalline et directe. Clarté absolue dans l'expression. Courage de dire la vérité dans toutes les situations. Idéale pour les orateurs, avocats, professeurs.",purification:"Eau courante, lumière de lune.",port:"Pendentif gorge de qualité. Bijou précieux.",mindat:"https://www.mindat.org/min-570.html",wiki:"https://fr.wikipedia.org/wiki/Aigue-marine",color:"#0EA5E9"},
{id:86,gem:"🟢",name:"Gaspeite",tagline:"Chance, succès & réalisation",category:"Émotionnel",maux:["Chance","Succès","Réalisation","Abondance","Confiance","Nouvelles opportunités"],chakras:["Cœur","Plexus solaire"],composition:"Carbonate de nickel NiCO₃ (avec magnésium et fer), vert pomme vif, rare",vertus:"Pierre rare apportant chance et succès dans les nouvelles entreprises. Favorise la réalisation des projets. Attire les opportunités inattendues. Développe la confiance en ses capacités de réalisation. Combinaison d'énergie du cœur et du plexus solaire.",purification:"Eau courante brève, lumière de lune.",port:"Poche lors de lancements de projets. Bracelet ou pendentif.",mindat:"https://www.mindat.org/min-1639.html",wiki:"https://fr.wikipedia.org/wiki/Gasp%C3%A9ite",color:"#86EFAC"},
{id:87,gem:"🟤",name:"Pierre de Sang (Héliotrope)",tagline:"Vitalité guerrière & courage dans l'épreuve",category:"Physique",maux:["Vitalité","Sang","Anémie","Courage","Détox","Foie","Circulation"],chakras:["Racine","Cœur"],composition:"Quartz vert (jaspe) avec taches rouges d'oxyde de fer, cryptocristallin",vertus:"Pierre guerrière par excellence. Fortifie le sang et combat l'anémie. Détoxifie le foie et les reins. Donne courage dans les épreuves difficiles. Stimule la circulation et la vitalité. Utilisée dans l'Antiquité par les gladiateurs et soldats.",purification:"Eau courante, lumière du soleil.",port:"Bracelet, bague. Idéale pour les sportifs et convalescents.",mindat:"https://www.mindat.org/min-2087.html",wiki:"https://fr.wikipedia.org/wiki/H%C3%A9liotrope_(min%C3%A9ralogie)",color:"#166534"},
{id:88,gem:"⬜",name:"Quartz Fumé",tagline:"Ancrage, détox & dissolution des peurs",category:"Physique",maux:["Ancrage","Détox","Peurs","Dépression","Stress","Radiation"],chakras:["Racine"],composition:"Quartz gris-brun irradié naturellement (aluminium + radioactivité naturelle), SiO₂",vertus:"Ancrage puissant et progressif. Détoxifie corps et énergie. Dissout les peurs et les blocages inconscients. Absorbe les radiations (utile près des écrans). Combat la dépression. Transforme les énergies négatives en positives.",purification:"Eau courante, terre, fumigation. Purifier régulièrement.",port:"Bracelet, poche, près des ordinateurs. Pierre de bureau.",mindat:"https://www.mindat.org/min-3337.html",wiki:"https://fr.wikipedia.org/wiki/Quartz_fum%C3%A9",color:"#6B7280"},

{id:90,gem:"💜",name:"Sugilite Violette",tagline:"Guérison profonde & amour universel",category:"Spirituel",maux:["Guérison","Amour universel","Désespoir","Protection","Cancer (accomp.)","Céphalées"],chakras:["Couronne","Cœur","Troisième œil"],composition:"Silicate cyclique de potassium, sodium et lithium, violet intense, rare (Japon/Afrique du Sud)",vertus:"L'une des pierres de guérison les plus puissantes. Amour universel en période de désespoir. Protection psychique totale. Soutien psycho-émotionnel lors de maladies graves. Soulage les céphalées intenses. Développe les dons de guérison.",purification:"Lumière de lune, encens de sauge. Éviter l'eau.",port:"Pendentif, pierre de soin. Tenir lors des soins ou de l'accompagnement de malades.",mindat:"https://www.mindat.org/min-3831.html",wiki:"https://fr.wikipedia.org/wiki/Sugilite",color:"#6B21A8"},
{id:91,gem:"🔵",name:"Azurite",tagline:"Vision psychique & éveil du troisième œil",category:"Spirituel",maux:["Clairvoyance","Méditation","Arthrite","Articulations","Communication divine","Troisième œil"],chakras:["Troisième œil","Gorge"],composition:"Carbonate de cuivre basique Cu₃(CO₃)₂(OH)₂, bleu intense, souvent avec malachite",vertus:"Éveil puissant du troisième œil. Développe la clairvoyance et les visions. Soulage l'arthrite et les douleurs articulaires. Favorise la méditation et la connexion divine. Souvent associée à la malachite (Azurite-Malachite).",purification:"Lumière de lune uniquement. JAMAIS dans l'eau (soluble). Très fragile.",port:"Pierre de méditation. Poser sur le front lors des méditations. Pendentif précieux.",mindat:"https://www.mindat.org/min-432.html",wiki:"https://fr.wikipedia.org/wiki/Azurite",color:"#1E3A8A"},
{id:92,gem:"🟢",name:"Dioptase",tagline:"Pardon profond & renouveau du cœur",category:"Émotionnel",maux:["Pardon","Traumatisme profond","Renouveau","Dépression chronique","Cœur","Ulcères"],chakras:["Cœur"],composition:"Cyclosilicate de cuivre hydraté CuSiO₂(OH)₂, vert émeraude intense, cristaux courts",vertus:"Le pardon le plus profond possible. Libère les traumatismes émotionnels très anciens. Apporte renouveau et espoir même dans la dépression chronique. Soulage les ulcères liés au stress émotionnel. Pierre de la seconde chance.",purification:"Lumière de lune uniquement. JAMAIS dans l'eau (toxique en poudre). Fragile.",port:"Pierre de soin tenue dans la main. Pendentif précieux avec soin.",mindat:"https://www.mindat.org/min-1283.html",wiki:"https://fr.wikipedia.org/wiki/Dioptase",color:"#059669"},
{id:93,gem:"🩶",name:"Hackmanite (Sodalite rose)",tagline:"Amour honteux & révélation de soi",category:"Émotionnel",maux:["Honte","Révélation","Authenticité","Amour de soi","Secrets","Courage de soi"],chakras:["Gorge","Cœur"],composition:"Variété de sodalite rose qui vire au gris à la lumière (tenebrescence)",vertus:"Aide à révéler ce qui est caché ou honteux. Développe l'authenticité et le courage d'être soi-même. Libère des secrets qui pèsent. Amour de soi malgré les imperfections. Curiosité scientifique : change de couleur à la lumière UV.",purification:"Eau courante brève, lumière de lune.",port:"Pendentif, bracelet. Pour les personnes qui cachent qui elles sont vraiment.",mindat:"https://www.mindat.org/min-1828.html",wiki:"https://fr.wikipedia.org/wiki/Hackmanite",color:"#FDA4AF"},
{id:94,gem:"🌿",name:"Vanadinite",tagline:"Énergie créatrice & ancrage mental",category:"Physique",maux:["Énergie créatrice","Respiration","Asthme","Concentration","Procrastination","Fatigue"],chakras:["Plexus solaire","Racine","Sacré"],composition:"Vanadate de plomb Pb₅(VO₄)₃Cl, cristaux hexagonaux rouge-orange vif",vertus:"Stimule l'énergie créatrice et mentale puissamment. Soulage les troubles respiratoires et l'asthme. Combat la procrastination par l'énergie d'action. Concentre l'esprit sur les objectifs. Fatigue chronique. NOTE : contient du plomb — ne pas avaler ni broyer.",purification:"JAMAIS dans l'eau (toxique, contient plomb). Encens uniquement. Laver les mains après.",port:"Pierre d'observation uniquement. Ne pas utiliser en bracelet direct sur peau prolongé.",mindat:"https://www.mindat.org/min-4168.html",wiki:"https://fr.wikipedia.org/wiki/Vanadinite",color:"#B91C1C"},
{id:95,gem:"🟡",name:"Sphène (Titanite)",tagline:"Intelligence spirituelle & conscience élevée",category:"Spirituel",maux:["Intelligence spirituelle","Intuition","Mémoire","Apprentissage","Conscience","Mental"],chakras:["Troisième œil","Couronne","Plexus solaire"],composition:"Silicate de calcium et titane CaTiSiO₅, feu optique intense (dispersion > diamant)",vertus:"Stimule l'intelligence spirituelle et la conscience élevée. Amplifie les capacités de mémorisation et d'apprentissage. Développe l'intuition pratique. Connecte aux énergies universelles via un mental affiné. Pierre rare des intellectuels spirituels.",purification:"Eau courante, lumière de lune.",port:"Pendentif, pierre de méditation intellectuelle.",mindat:"https://www.mindat.org/min-3816.html",wiki:"https://fr.wikipedia.org/wiki/Titanite",color:"#D97706"},
{id:96,gem:"🟣",name:"Tanzanite",tagline:"Transformation spirituelle & communication divine",category:"Spirituel",maux:["Transformation spirituelle","Communication divine","Intuition","Méditation","Conscience"],chakras:["Troisième œil","Gorge","Couronne"],composition:"Zoïsite bleue-violette colorée par le vanadium, trouvée uniquement en Tanzanie",vertus:"L'une des pierres de transformation spirituelle les plus puissantes de l'ère moderne. Communication divine directe. Intensification de la méditation. Développe la conscience multidimensionnelle. Très rare et précieuse. Idéale pour les praticiens avancés.",purification:"Eau courante, lumière de lune. Éviter chaleur et ultrasons.",port:"Bijou précieux, pendentif de méditation.",mindat:"https://www.mindat.org/min-3991.html",wiki:"https://fr.wikipedia.org/wiki/Tanzanite",color:"#5B21B6"},
{id:97,gem:"🔵",name:"Aqua Aura Quartz",tagline:"Communication angélique & protection vibratoire",category:"Spirituel",maux:["Communication divine","Protection aura","Dépression","Anxiété profonde","Canal psychique"],chakras:["Gorge","Troisième œil","Couronne"],composition:"Quartz cristal recouvert d'or pur par dépôt sous vide à haute température, bleu irisé",vertus:"Communication avec les anges et guides. Protection vibratoire puissante de l'aura. Soulage la dépression et l'anxiété profonde. Ouvre le canal psychique. Note : pierre traitée (quartz + or pur) mais énergétiquement puissante selon les pratiquants.",purification:"Eau courante douce, lumière de lune.",port:"Pendentif, boucles d'oreilles. Utilisation en lithothérapie avancée.",mindat:"https://www.mindat.org/min-3337.html",wiki:"https://fr.wikipedia.org/wiki/Quartz",color:"#38BDF8"},
{id:98,gem:"🌈",name:"Quartz Titane (Rainbow Aura)",tagline:"Joie arc-en-ciel & activation des chakras",category:"Spirituel",maux:["Joie","Activation des chakras","Dépression","Créativité","Énergie","Enthousiasme"],chakras:["Tous les chakras"],composition:"Quartz cristal traité avec du titane et du niobium, reflets multicolores métalliques",vertus:"Activation simultanée de tous les chakras. Joie arc-en-ciel et enthousiasme. Combat la dépression par ses couleurs et son énergie. Créativité débordante. Energie positive contagieuse. Note : quartz traité mais populaire en lithothérapie.",purification:"Eau courante douce uniquement. Éviter l'eau prolongée (revêtement fragile).",port:"Pendentif, bracelet. Porter lors des journées difficiles.",mindat:"https://www.mindat.org/min-3337.html",wiki:"https://fr.wikipedia.org/wiki/Quartz",color:"#A855F7"},
{id:99,gem:"🩵",name:"Calcite Caraïbes (Aragonite Bleue)",tagline:"Détente absolue & communication fluide",category:"Émotionnel",maux:["Détente","Communication","Stress extrême","Surmenage","Paix","Recharge"],chakras:["Gorge","Troisième œil","Cœur"],composition:"Aragonite et calcite bleue-blanche du Pakistan, carbonate de calcium polymorphe",vertus:"L'une des énergies les plus relaxantes de la minéralogie. Détente absolue du système nerveux. Communication fluide et naturelle. Soulagement du surmenage et du burn-out. Recharge en douceur. Idéale pour les vacances et le ressourcement.",purification:"Lumière de lune. JAMAIS dans l'eau (fragile). Éviter les chocs.",port:"Pierre de nuit, poche. Tenir lors des voyages ou vacances.",mindat:"https://www.mindat.org/min-305.html",wiki:"https://fr.wikipedia.org/wiki/Aragonite",color:"#BAE6FD"},
{id:100,gem:"🟤",name:"Stilbite",tagline:"Amour doux & ouverture du cœur en méditation",category:"Spirituel",maux:["Méditation","Amour doux","Détox","Foie","Laryngite","Perte de soi"],chakras:["Cœur","Couronne"],composition:"Tectosilicate de calcium et sodium de la famille des zéolites, cristaux en gerbe pêche-blanc",vertus:"Amour doux et enveloppant lors des méditations. Détox du foie et des poumons. Soulage la laryngite. Aide à retrouver son sens de soi lors des crises identitaires. Ouverture douce du cœur. Énergie très apaisante et maternelle.",purification:"Lumière de lune uniquement. JAMAIS dans l'eau (zéolite, absorbe l'eau). Fragile.",port:"Pierre de méditation. Poser dans la chambre.",mindat:"https://www.mindat.org/min-3790.html",wiki:"https://fr.wikipedia.org/wiki/Stilbite",color:"#FDE68A"},
{id:101,gem:"🟣",name:"Iolite Violette",tagline:"Voyages intérieurs & conscience de l'âme",category:"Spirituel",maux:["Voyage intérieur","Âme","Alcool","Foie","Direction","Boussole intérieure"],chakras:["Troisième œil","Couronne"],composition:"Cordiérite Mg₂Al₄Si₅O₁₈, pléochroïsme fort (bleu/violet/gris selon l'angle)",vertus:"Facilite les voyages intérieurs profonds et la conscience de l'âme. Aide les personnes à trouver leur direction de vie. Soutient la désintoxication à l'alcool. Soutient le foie. Les Vikings utilisaient l'iolite comme première boussole (filtre polarisant).",purification:"Eau courante, lumière de lune.",port:"Pendentif, méditation. Tenir lors des prises de décision importantes.",mindat:"https://www.mindat.org/min-1008.html",wiki:"https://fr.wikipedia.org/wiki/Cord%C3%A9rite",color:"#7C3AED"},
{id:102,gem:"⚪",name:"Calcite Islandique (Spath d'Islande)",tagline:"Clarté de vision & vérité double",category:"Spirituel",maux:["Clarté","Double vision","Vérité","Illusions","Méditation","Optique"],chakras:["Couronne","Troisième œil"],composition:"Calcite incolore CaCO₃ à biréfringence double extrême (calcite optique cristalline)",vertus:"Dissipe les illusions et révèle la vérité sous tous ses angles. Clarté de vision au sens propre et figuré. Favorise la méditation profonde. Élimine la peur et le stress. Amplifie les énergies. Utilisé historiquement comme lentille optique.",purification:"Lumière de lune. JAMAIS dans l'eau. Fragile.",port:"Pierre de méditation. Regarder à travers pour la clarté symbolique.",mindat:"https://www.mindat.org/min-859.html",wiki:"https://fr.wikipedia.org/wiki/Calcite",color:"#F8FAFC"},
{id:103,gem:"🔵",name:"Aquamarine Brésilienne",tagline:"Communication profonde & courage de mer",category:"Émotionnel",maux:["Communication","Courage","Stress","Protection voyage","Thyroïde","Gorge"],chakras:["Gorge","Cœur"],composition:"Béryl bleu clair Al₂Be₃Si₆O₁₈ du Brésil, qualité gemme, bleu ciel pâle",vertus:"Communication authentique et profonde depuis le cœur. Courage de traverser les tempêtes. Protection des voyageurs (mer, air). Soutien de la thyroïde. Soulage les maux de gorge. Idéale pour les personnes qui ont peur de parler en public.",purification:"Eau courante, lumière de lune.",port:"Pendentif gorge, boucles d'oreilles.",mindat:"https://www.mindat.org/min-570.html",wiki:"https://fr.wikipedia.org/wiki/Aigue-marine",color:"#93C5FD"},

{id:105,gem:"🔴",name:"Grenat Rouge (Pyrope-Almandin)",tagline:"Passion ardente, dévotion & vitalité",category:"Physique",maux:["Vitalité","Passion","Libido","Circulation","Courage","Dévotion","Anémie"],chakras:["Racine","Cœur"],composition:"Grenat rouge (pyrope Mg₃Al₂Si₃O₁₂ ou almandin Fe₃Al₂Si₃O₁₂), dureté 6.5-7.5",vertus:"Stimule la vitalité et la passion ardente. Renforce la libido et le désir. Améliore la circulation sanguine. Donne courage et dévotion. Combat l'anémie. Pierre des amoureux et des guerriers depuis l'Antiquité.",purification:"Eau courante, lumière du soleil.",port:"Bague, bracelet, pendentif. Cadeau romantique traditionnel.",mindat:"https://www.mindat.org/min-3743.html",wiki:"https://fr.wikipedia.org/wiki/Grenat",color:"#9F1239"},
{id:106,gem:"🟢",name:"Grenat Démantoïde",tagline:"Prospérité verte & force magnétique",category:"Émotionnel",maux:["Prospérité","Force","Magnétisme","Chance","Abondance","Succès"],chakras:["Cœur","Plexus solaire"],composition:"Grenat andradite-uvarovite vert (calcium-aluminium), plus rare que le diamant pour la qualité",vertus:"Le plus précieux des grenats. Prospérité et chance magnétiques. Force personnelle exceptionnelle. Magnétisme naturel et charisme. Abondance et succès dans les affaires. Pierre extrêmement rare et recherchée.",purification:"Eau courante, lumière de lune.",port:"Bijou précieux. Bague, pendentif.",mindat:"https://www.mindat.org/min-3743.html",wiki:"https://fr.wikipedia.org/wiki/Grenat",color:"#15803D"},
{id:107,gem:"🩵",name:"Hémimorphite Bleue",tagline:"Empathie, lumière & développement psychique",category:"Spirituel",maux:["Empathie","Développement psychique","Lumière intérieure","Communication","Ego","Compassion"],chakras:["Cœur","Gorge","Troisième œil"],composition:"Silicate de zinc hydraté Zn₄(Si₂O₇)(OH)₂·H₂O bleu-turquoise de qualité",vertus:"Développement psychique intense. Empathie et compassion profondes. Réduction de l'ego. Connexion à sa lumière intérieure. Communication depuis l'amour. Idéale pour les guérisseurs et personnes sur le chemin du service.",purification:"Eau courante brève, lumière de lune.",port:"Pendentif, pierre de soin.",mindat:"https://www.mindat.org/min-1864.html",wiki:"https://fr.wikipedia.org/wiki/H%C3%A9mimorphite",color:"#0EA5E9"},
{id:108,gem:"🟡",name:"Zircon Doré",tagline:"Sagesse ancienne & connexion spirituelle",category:"Spirituel",maux:["Sagesse","Sommeil","Prospérité","Confiance","Honneur","Connexion divine"],chakras:["Couronne","Plexus solaire"],composition:"Silicate de zirconium ZrSiO₄, le plus vieux minéral de Terre (4,4 milliards d'années)",vertus:"Porte la sagesse de la Terre la plus ancienne. Favorise un sommeil profond et des rêves sages. Attire la prospérité et l'honneur. Développe la confiance et la dignité. Connexion à la sagesse de nos ancêtres.",purification:"Eau courante, lumière de lune.",port:"Bijou, pendentif. Porter lors des prises de décisions importantes.",mindat:"https://www.mindat.org/min-4510.html",wiki:"https://fr.wikipedia.org/wiki/Zircon",color:"#FDE68A"},
{id:109,gem:"⚪",name:"Phénacite",tagline:"Éveil transcendant & activation pinéale",category:"Spirituel",maux:["Éveil","Glande pinéale","Méditation avancée","Connexion divine","Conscience","Kundalini"],chakras:["Troisième œil","Couronne","Étoile de l'âme"],composition:"Beryllium silicate Be₂SiO₄, incolore, cristaux rhomboédriques, extrêmement rare",vertus:"L'une des pierres d'éveil les plus puissantes qui soit. Activation de la glande pinéale. Méditation transcendante. Connexion divine directe. Activation de la kundalini. Réservée aux pratiquants très avancés — peut être déstabilisante.",purification:"Lumière de lune, encens de résine sacrée.",port:"Méditation uniquement. Pierre rare et précieuse. Usage progressif et prudent.",mindat:"https://www.mindat.org/min-3191.html",wiki:"https://fr.wikipedia.org/wiki/Ph%C3%A9nacite",color:"#F8FAFC"},
{id:110,gem:"🔵",name:"Nuummite",tagline:"La plus vieille magie & ancrage cosmique",category:"Spirituel",maux:["Magie ancienne","Protection occulte","Ego","Karma","Courage intérieur","Vérité de l'âme"],chakras:["Racine","Troisième œil","Couronne"],composition:"Roche métamorphique à amphiboles (gedrite-anthophyllite) du Groenland, 3 milliards d'années",vertus:"La pierre terrestre la plus ancienne utilisée en lithothérapie. Magie la plus ancienne. Protection occulte puissante. Travail sur l'ego profond. Nettoyage karmique intense. Courage de regarder sa vérité en face. Pour pratiquants avancés.",purification:"Lumière de lune, encens de résine. Avec grande précaution.",port:"Pierre de poche ou méditation. Pratiquants expérimentés seulement.",mindat:"https://www.mindat.org/min-14.html",wiki:"https://fr.wikipedia.org/wiki/Nuummite",color:"#0C0A09"},

{id:113,gem:"🟠",name:"Zincite",tagline:"Créativité explosive & énergie vitale du feu",category:"Physique",maux:["Créativité","Énergie","Vitalité","Libido","Fertilité","Kundalini","Ancrage feu"],chakras:["Racine","Sacré"],composition:"Oxyde de zinc ZnO, rouge-orange, souvent synthétique (fonderies polonaises) mais utilisée",vertus:"Créativité explosive et énergie vitale intense. Stimule la libido et la fertilité. Éveille la kundalini. Ancrage par le feu. Énergie très yang et active. Idéale pour les personnes en manque total d'énergie. Attention à l'intensité.",purification:"Lumière du soleil brève, encens. Éviter l'eau.",port:"Pierre de poche. Porter progressivement en raison de l'intensité.",mindat:"https://www.mindat.org/min-4505.html",wiki:"https://fr.wikipedia.org/wiki/Zincite",color:"#EA580C"},
{id:114,gem:"🔵",name:"Indicolite (Tourmaline Bleue)",tagline:"Communication spirituelle & vérité profonde",category:"Spirituel",maux:["Communication spirituelle","Clairvoyance","Vérité","Gorge","Paix mentale","Intuition"],chakras:["Gorge","Troisième œil","Couronne"],composition:"Tourmaline bleue colorée par le fer ferreux (Fe²⁺), rare et précieuse",vertus:"Communication spirituelle et psychique de haute vibration. Clairvoyance et vérité profonde. Paix mentale intense. Connexion aux royaumes supérieurs. Rare et précieuse. Idéale pour les médiums et clairvoyants.",purification:"Eau courante, lumière de lune.",port:"Pendentif gorge ou troisième œil. Bijou rare.",mindat:"https://www.mindat.org/min-4003.html",wiki:"https://fr.wikipedia.org/wiki/Tourmaline",color:"#0EA5E9"},
{id:115,gem:"🩷",name:"Rubellite (Tourmaline Rose-Rouge)",tagline:"Amour ardent & joie du cœur vivant",category:"Émotionnel",maux:["Amour ardent","Cœur","Joie","Vitalité","Libido","Relations passionnées"],chakras:["Cœur","Racine"],composition:"Tourmaline rose à rouge colorée par le manganèse et le lithium, rare et précieuse",vertus:"Amour ardent combiné à la joie du cœur. Vitalité émotionnelle intense. Renforce les relations passionnées. Stimule la libido depuis l'amour. Ouvre le cœur à la joie pure. Pierre rare idéale en bijou précieux.",purification:"Eau courante, lumière de lune.",port:"Bijou précieux, bague, pendentif.",mindat:"https://www.mindat.org/min-4003.html",wiki:"https://fr.wikipedia.org/wiki/Tourmaline",color:"#E11D48"},
{id:116,gem:"🟢",name:"Verdelite (Tourmaline Verte)",tagline:"Guérison de la nature & cœur vert",category:"Émotionnel",maux:["Guérison","Cœur","Nature","Immunité","Renouveau","Détox"],chakras:["Cœur"],composition:"Tourmaline verte colorée par le chrome ou le fer ferrique, système trigonal",vertus:"Guérison depuis la force de la nature. Ouvre et renforce le chakra cœur. Renforce l'immunité. Connecte à l'énergie verte de la Terre. Renouveau et régénération. Détoxification profonde.",purification:"Eau courante, lumière de lune, contact avec la terre.",port:"Pendentif cœur, bracelet. Porter en nature.",mindat:"https://www.mindat.org/min-4003.html",wiki:"https://fr.wikipedia.org/wiki/Tourmaline",color:"#16A34A"},
{id:117,gem:"🌈",name:"Tourmaline Pastèque",tagline:"Amour équilibré & harmonie parfaite",category:"Émotionnel",maux:["Amour équilibré","Harmonie","Yin-Yang","Relations","Cœur","Joie douce"],chakras:["Cœur"],composition:"Tourmaline bicolore rose au centre et verte en bordure (croissance zonée), rare",vertus:"Pierre de l'amour le plus équilibré (yin-yang). Harmonie parfaite entre cœur et passion. Relations harmonieuses et durables. Joie douce et légère. L'une des plus belles pierres d'amour qui existe.",purification:"Eau courante, lumière de lune.",port:"Bijou précieux, pendentif cœur. Cadeau de couple parfait.",mindat:"https://www.mindat.org/min-4003.html",wiki:"https://fr.wikipedia.org/wiki/Tourmaline",color:"#F472B6"},

// ── Constants ─────────────────────────────────────────────────────────────────
const ALL_MAUX = [...new Set(STONES.flatMap(s=>s.maux))].sort();
const CATS = ['Émotionnel','Physique','Spirituel'];
const CC = {Émotionnel:'#F472B6',Physique:'#34D399',Spirituel:'#C084FC'};
const CI = {Émotionnel:'💗',Physique:'💪',Spirituel:'🔮'};
const TOXIC = [94,133,134,135,136,149]; // stone IDs with toxic minerals

// ── Storage ──────────────────────────────────────────────────────────────────
function lsG(k,d){try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):d}catch(e){return d}}
function lsS(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
let favs=new Set(lsG('crx_favs',[]));
let notes=lsG('crx_notes',{});
let lm=lsG('crx_lm',false);
function applyTheme(){document.body.classList.toggle('lm',lm)}
applyTheme();

// ── State ─────────────────────────────────────────────────────────────────────
let S={tab:'pierres',sid:null,q:'',cat:''};
const $=i=>document.getElementById(i);
function go(p){Object.assign(S,p);R();window.scrollTo(0,0)}
function R(){$('app').innerHTML=render();bindAll()}

// ── Render ────────────────────────────────────────────────────────────────────
function render(){
  if(S.sid)return renderDetail();
  return renderHome();
}

function renderHome(){
  return hdr()+tabs()+renderTab();
}

function renderTab(){
  if(S.tab==='favoris') return renderFavs();
  if(S.tab==='maux') return renderMaux();
  return renderPierres();
}

function renderPierres(){
  const q=S.q.toLowerCase();
  let st=STONES.filter(s=>{
    const mq=!q||s.name.toLowerCase().includes(q)||s.maux.some(m=>m.toLowerCase().includes(q))||s.tagline.toLowerCase().includes(q)||s.vertus.toLowerCase().includes(q);
    const mc=!S.cat||s.category===S.cat;
    return mq&&mc;
  });
  st.sort((a,b)=>{
    const af=favs.has(a.id),bf=favs.has(b.id);
    if(af&&!bf)return-1;if(!af&&bf)return 1;return 0;
  });
  return'<div class="search-wrap"><span class="search-ico">🔍</span><input class="si" id="sq" placeholder="Chercher pierre, vertu, bienfait…" value="'+S.q+'"></div>'
    +'<div class="chs">'
    +'<button class="ch'+(S.cat?'':' on')+'"'+(S.cat?'':' style="background:var(--ac2)"')+' data-cat="">Toutes ('+STONES.length+')</button>'
    +CATS.map(c=>'<button class="ch'+(S.cat===c?' on':'')+'" data-cat="'+c+'"'+(S.cat===c?' style="background:'+CC[c]+'"':'')+'>'+CI[c]+' '+c+'</button>').join('')
    +'</div>'
    +'<div class="grid">'+st.map(s=>stoneCard(s)).join('')+'</div>';
}

function renderMaux(){
  const q=S.q.toLowerCase();
  const fm=ALL_MAUX.filter(m=>!q||m.toLowerCase().includes(q));
  return'<div class="search-wrap"><span class="search-ico">🩺</span><input class="si" id="sq" placeholder="Chercher un besoin, un symptôme…" value="'+S.q+'"></div>'
    +fm.map(mal=>{
      const st=STONES.filter(s=>s.maux.includes(mal));
      if(!st.length)return'';
      return'<div class="ct">'+mal+' <span style="font-size:.6rem;color:var(--tl);font-weight:600;text-transform:none;letter-spacing:0">('+st.length+' pierre'+(st.length>1?'s':'')+')</span></div>'
        +'<div class="grid" style="padding-bottom:4px">'+st.map(s=>stoneCard(s)).join('')+'</div>';
    }).join('')+'<div style="height:40px"></div>';
}

function renderFavs(){
  const fs=STONES.filter(s=>favs.has(s.id));
  if(!fs.length)return'<div class="empty"><div class="big">💎</div><p>Aucune pierre en favori.<br>Appuyez sur ☆ pour épingler ici.</p></div>';
  return'<div class="ct">'+fs.length+' pierre'+(fs.length>1?'s':'')+' épinglée'+(fs.length>1?'s':'')+'</div>'
    +'<div class="grid">'+fs.map(s=>stoneCard(s)).join('')+'</div>'
    +'<div style="height:40px"></div>';
}

function stoneCard(s){
  const isFav=favs.has(s.id);
  const note=notes[s.id]||0;
  const isTox=TOXIC.includes(s.id);
  return'<div class="sc" data-sid="'+s.id+'">'
    +'<div class="cdot" style="background:'+s.color+';color:'+s.color+'"></div>'
    +'<button class="fav-btn'+(isFav?' on':'')+'" data-fav="'+s.id+'">'+(isFav?'⭐':'☆')+'</button>'
    +(isTox?'<span class="warn" title="Manipulation prudente">⚠️</span>':'')
    +'<span class="gem">'+s.gem+'</span>'
    +'<h3>'+s.name+'</h3>'
    +'<p class="tg">'+s.tagline+'</p>'
    +'<span class="cat-bd" style="background:'+CC[s.category]+'18;color:'+CC[s.category]+';border:1px solid '+CC[s.category]+'33">'+CI[s.category]+' '+s.category+'</span>'
    +(note?'<div style="font-size:.7rem;margin-top:2px;opacity:.9">'+['','⭐','⭐⭐','⭐⭐⭐','⭐⭐⭐⭐','⭐⭐⭐⭐⭐'][note]+'</div>':'')
    +'</div>';
}

function renderDetail(){
  const s=STONES.find(x=>x.id===S.sid);
  if(!s)return renderHome();
  const isFav=favs.has(s.id);
  const note=notes[s.id]||0;
  const isTox=TOXIC.includes(s.id);
  const conseil='« '+s.tagline+' — pour '+s.maux.slice(0,3).join(', ')+'. Port conseillé : '+s.port+' »';
  return'<div class="hdr">'
    +'<div class="hdr-row"><div>'
    +'<button class="bk" id="bk">◂ Retour</button>'
    +'<h1 style="font-size:1.1rem;font-style:italic">'+s.name+'</h1>'
    +'<p style="opacity:.8;font-size:.76rem">'+CI[s.category]+' '+s.category+'</p>'
    +'</div><div class="hdr-acts">'
    +'<button class="ico-btn" id="fav-hdr">'+(isFav?'⭐':'☆')+'</button>'
    +'<button class="ico-btn" id="set-btn">⚙️</button>'
    +'</div></div></div>'
    +'<div class="hr">'
    +'<span class="gem-big">'+s.gem+'</span>'
    +'<h2>'+s.name+'</h2>'
    +'<p class="tg-big">'+s.tagline+'</p>'
    +'<div class="badges-row">'
    +'<span class="cat-bd" style="background:'+CC[s.category]+'22;color:'+CC[s.category]+';border:1px solid '+CC[s.category]+'44;padding:5px 14px;font-size:.7rem">'+CI[s.category]+' '+s.category+'</span>'
    +(isTox?'<span class="cat-bd" style="background:rgba(239,68,68,.15);color:#FCA5A5;border:1px solid rgba(239,68,68,.3);padding:5px 14px;font-size:.7rem">⚠️ Manipulation prudente</span>':'')
    +'</div>'
    +'<p style="font-size:.72rem;color:var(--tl);margin-top:10px;font-weight:600">Votre note :</p>'
    +'<div class="stars-row">'+[1,2,3,4,5].map(i=>'<button class="star-btn'+(note>=i?' lit':'')+'" data-note="'+i+'">⭐</button>').join('')+'</div>'
    +'</div>'
    // Toxic warning
    +(isTox?'<div class="warn-box">⚠️ Cette pierre contient des minéraux potentiellement toxiques. Ne jamais mettre en contact avec l\'eau destinée à la consommation. Ne pas avaler. Laver les mains après manipulation.</div>':'')
    // Chakras
    +'<div class="ct">Chakras associés</div>'
    +'<div class="cha-bar">'+s.chakras.map(c=>'<span class="cha-tag"><span class="cha-dot" style="background:'+s.color+';color:'+s.color+'"></span>'+c+'</span>').join('')+'</div>'
    // Bienfaits
    +'<div class="ct">Bienfaits & maux traités</div>'
    +'<div class="icf"><div class="maux-wrap">'+s.maux.map(m=>'<span class="mp">'+m+'</span>').join('')+'</div></div>'
    // Vertus
    +'<div class="ct">Vertus détaillées</div>'
    +'<div class="icf"><p class="val">'+s.vertus+'</p></div>'
    // Port
    +'<div class="ct">Comment la porter</div>'
    +'<div class="icf"><p class="val">'+s.port+'</p></div>'
    // Composition + Purification
    +'<div class="info-grid">'
    +'<div class="ic"><div class="lbl">🔬 Composition</div><div class="val">'+s.composition+'</div></div>'
    +'<div class="ic"><div class="lbl">💧 Purification</div><div class="val">'+s.purification+'</div></div>'
    +'</div>'
    // Conseil vendeur
    +'<div class="ct">💬 Conseil vendeur</div>'
    +'<div class="conseil-card">'
    +'<p class="conseil-txt" id="conseil-txt">'+conseil+'</p>'
    +'<button class="conseil-copy" id="copy-conseil">📋 Copier le conseil</button>'
    +'</div>'
    // Sources
    +'<div class="ct">📚 Sources encyclopédiques</div>'
    +'<a href="'+s.mindat+'" target="_blank" class="lnk">'
    +'<span class="lnk-ico">🔬</span><div class="lnk-text"><div class="lnk-title">Mindat.org — Base minéralogique mondiale</div><div class="lnk-sub">Cristallographie · Composition · Gisements · Photos</div></div><span class="arr">→</span></a>'
    +'<a href="'+s.wiki+'" target="_blank" class="lnk">'
    +'<span class="lnk-ico">📚</span><div class="lnk-text"><div class="lnk-title">Wikipédia — Encyclopédie scientifique</div><div class="lnk-sub">Histoire · Propriétés · Étymologie</div></div><span class="arr">→</span></a>'
    +'<div style="height:60px"></div>';
}

function hdr(){
  const fs=favs.size;
  return'<div class="hdr"><div class="hdr-row"><div>'
    +'<h1>💎 Cristaux de Lorient</h1>'
    +'<p>'+STONES.length+' pierres · Guide lithothérapie</p>'
    +'</div><div class="hdr-acts"><button class="ico-btn" id="set-btn">⚙️</button></div></div></div>';
}

function tabs(){
  const fs=favs.size;
  return'<div class="tabs">'
    +'<div class="tab'+(S.tab==='pierres'?' on':'')+'" data-tab="pierres">💎 Pierres</div>'
    +'<div class="tab'+(S.tab==='maux'?' on':'')+'" data-tab="maux">🩺 Par besoin</div>'
    +'<div class="tab'+(S.tab==='favoris'?' on':'')+'" data-tab="favoris">⭐'+(fs?' ('+fs+')':'')+'</div>'
    +'</div>';
}

function openSettings(){
  const div=document.createElement('div');div.className='modal-bg';
  div.innerHTML='<div class="modal"><h2>⚙️ Réglages</h2>'
    +'<div class="mrow"><div><div class="mlabel">☀️ Mode clair</div><div class="msub">Fond blanc lumineux</div></div><div class="toggle'+(lm?' on':'')+'" id="tog-lm"></div></div>'
    +'<div class="mrow"><div><div class="mlabel">⭐ Effacer les favoris</div><div class="msub">'+favs.size+' pierre'+(favs.size>1?'s':'')+' épinglée'+(favs.size>1?'s':'')+'</div></div><button id="btn-clr-fav" style="background:rgba(239,68,68,.12);color:#F87171;border-radius:10px;padding:7px 13px;font-size:.76rem;font-weight:700;border:none;cursor:pointer">Effacer</button></div>'
    +'<div class="mrow"><div><div class="mlabel">🌟 Effacer les notes</div><div class="msub">Remettre toutes les étoiles à zéro</div></div><button id="btn-clr-notes" style="background:rgba(239,68,68,.12);color:#F87171;border-radius:10px;padding:7px 13px;font-size:.76rem;font-weight:700;border:none;cursor:pointer">Effacer</button></div>'
    +'<button id="btn-close-modal" style="width:100%;margin-top:16px;padding:13px;background:var(--ac2);color:#fff;border-radius:14px;font-size:.88rem;font-weight:700;border:none;cursor:pointer;font-family:inherit">Fermer</button></div>';
  document.body.appendChild(div);
  $('tog-lm').onclick=()=>{lm=!lm;lsS('crx_lm',lm);applyTheme();div.remove();openSettings()};
  $('btn-clr-fav').onclick=()=>{if(confirm('Effacer tous les favoris ?')){favs=new Set();lsS('crx_favs',[]);div.remove();R()}};
  $('btn-clr-notes').onclick=()=>{if(confirm('Effacer toutes les notes ?')){notes={};lsS('crx_notes',{});div.remove();R()}};
  $('btn-close-modal').onclick=()=>div.remove();
  div.onclick=e=>{if(e.target===div)div.remove()};
}

function bindAll(){
  $('sq')&&$('sq').addEventListener('input',e=>go({q:e.target.value}));
  document.querySelectorAll('[data-tab]').forEach(t=>t.onclick=()=>go({tab:t.dataset.tab,q:'',cat:''}));
  document.querySelectorAll('[data-cat]').forEach(b=>b.onclick=()=>go({cat:b.dataset.cat===S.cat&&b.dataset.cat?'':b.dataset.cat}));
  document.querySelectorAll('.sc[data-sid]').forEach(c=>c.onclick=e=>{
    if(e.target.closest('.fav-btn'))return;
    go({sid:+c.dataset.sid});
  });
  document.querySelectorAll('.fav-btn[data-fav]').forEach(b=>b.onclick=e=>{
    e.stopPropagation();
    const id=+b.dataset.fav;
    if(favs.has(id))favs.delete(id);else favs.add(id);
    lsS('crx_favs',[...favs]);
    b.classList.toggle('on',favs.has(id));
    b.textContent=favs.has(id)?'⭐':'☆';
    const t=document.querySelector('[data-tab="favoris"]');
    if(t)t.innerHTML='⭐'+(favs.size?' ('+favs.size+')':'');
  });
  document.querySelectorAll('[data-note]').forEach(b=>b.onclick=()=>{
    const n=+b.dataset.note;
    notes[S.sid]=notes[S.sid]===n?0:n;
    lsS('crx_notes',notes);
    document.querySelectorAll('[data-note]').forEach((x,i)=>x.classList.toggle('lit',notes[S.sid]>i));
  });
  $('bk')&&$('bk').addEventListener('click',()=>go({sid:null}));
  $('fav-hdr')&&$('fav-hdr').addEventListener('click',()=>{
    if(favs.has(S.sid))favs.delete(S.sid);else favs.add(S.sid);
    lsS('crx_favs',[...favs]);R();
  });
  document.querySelectorAll('#set-btn').forEach(b=>b.onclick=openSettings);
  $('copy-conseil')&&$('copy-conseil').addEventListener('click',()=>{
    const txt=$('conseil-txt');if(!txt)return;
    navigator.clipboard&&navigator.clipboard.writeText(txt.textContent).then(()=>{
      $('copy-conseil').textContent='✅ Copié !';
      setTimeout(()=>{const b=$('copy-conseil');if(b)b.textContent='📋 Copier le conseil'},2000);
    });
  });
}
R();

</script>
</body>
</html>
